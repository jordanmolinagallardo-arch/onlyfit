    const file=e.target.files?.[0];if(!file)return;
    const fr=new FileReader();
    fr.onload=ev=>{DB.setPhoto(user.id,ev.target.result);updateUser({_photoTs:Date.now()});};
    fr.readAsDataURL(file);
    e.target.value='';
  };

  const savePw=()=>{
    setPwErr('');
    if(pw.length<6){setPwErr('Mínimo 6 caracteres');return;}
    updateUser({password:pw});setPw('');setPwSaved(true);setTimeout(()=>setPwSaved(false),2500);
  };

  return(
    <div style={{padding:'16px 16px 90px'}} className="slide">
      {/* Header with logout shortcut */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:52,marginBottom:20,paddingLeft:2,paddingRight:2}}>
        <div className="bb" style={{fontSize:28}}>Mi Perfil</div>
        <button onClick={logout} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:10,border:'1px solid rgba(248,113,113,.25)',background:'transparent',color:'#ef4444',cursor:'pointer',fontWeight:600,fontSize:13,transition:'all .15s'}}>
          <Ic n="x" size={14} c="#ef4444"/> Salir
        </button>
      </div>

      {/* Photo + Name */}
      <div style={{textAlign:'center',marginBottom:22}}>
        <input ref={photoRef} type="file" accept="image/*" onChange={changePhoto} style={{display:'none'}}/>
        <div style={{position:'relative',display:'inline-block',cursor:'pointer'}} onClick={()=>photoRef.current.click()}>
          <Avatar name={user.name} size={96} uid={user.id}/>
          <div style={{position:'absolute',bottom:0,right:0,width:30,height:30,borderRadius:'50%',background:'#FFB800',display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid #05050e'}}>
            <Ic n="camera" size={15} c="#05050e"/>
          </div>
        </div>
        <div style={{fontSize:10,color:'#6b7a99',marginTop:6}}>Toca la foto para cambiarla</div>
        <div className="bb" style={{fontSize:28,marginTop:10,lineHeight:1}}>{user.name}</div>
        <div style={{fontSize:12,color:'#6b7a99',marginTop:3}}>{user.email}</div>
        {user.phone&&<div style={{fontSize:11,color:'#28285a',marginTop:2}}>{user.phone}</div>}
        <div style={{marginTop:10,display:'flex',justifyContent:'center',gap:8,flexWrap:'wrap'}}>
          <Tag color={user.role==='admin'?'#FFB800':'#00e676'}>{user.role==='admin'?'🏆 Coach':'Cliente'}</Tag>
          {prof?.bio?.goal&&<Tag color={gc}>{tx(prof.bio.goal)}</Tag>}
          {prof?.bio?.tipoCuerpo&&<Tag color="#60a5fa" small>{prof.bio.tipoCuerpo}</Tag>}
        </div>
        {user.role!=='admin'&&days!==null&&(
          <div style={{marginTop:10,display:'inline-block',padding:'5px 14px',borderRadius:99,background:days<=3?'rgba(239,68,68,.12)':days<=7?'rgba(245,158,11,.12)':'rgba(0,230,118,.08)',color:days<=3?'#ef4444':days<=7?'#f59e0b':'#00e676',fontSize:12,fontWeight:600}}>
            {days>0?`📅 ${days} días restantes`:'⚠️ Suscripción vencida'}
          </div>
        )}
      </div>

      {/* Stats */}
      {prof?.bio?.peso&&(
        <div className="card" style={{marginBottom:11,background:'#0d0d22'}}>
          <div style={{display:'flex',justifyContent:'space-around'}}>
            {[{l:tx('calories'),v:m.calories+'kcal',c:'#00e676'},{l:'MLM',v:m.lbm+'kg',c:'#a78bfa'},{l:tx('tdeeLabel'),v:m.tdee+'kcal',c:'#60a5fa'}].map(x=>(
              <div key={x.l} style={{textAlign:'center'}}><div className="bb" style={{fontSize:20,color:x.c}}>{x.v}</div><div style={{fontSize:10,color:'#6b7a99'}}>{x.l}</div></div>
            ))}
          </div>
        </div>
      )}

      {/* Bio shortcut */}
      <button onClick={()=>go('bio')} className="card" style={{width:'100%',textAlign:'left',cursor:'pointer',marginBottom:10,display:'flex',alignItems:'center',justifyContent:'space-between',background:'#0d0d22',padding:'12px 15px'}}>
        <div style={{display:'flex',alignItems:'center',gap:11}}>
          <div style={{width:36,height:36,borderRadius:9,background:'rgba(0,230,118,.09)',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="activity" size={18} c="#00e676"/></div>
          <div><div style={{fontSize:13,fontWeight:500}}>{tx('bio')}</div>{prof?.bio?.updatedAt&&<div style={{fontSize:11,color:'#6b7a99'}}>{new Date(prof.bio.updatedAt).toLocaleDateString()}</div>}</div>
        </div>
        <Ic n="chevR" size={14} c="#28285a"/>
      </button>

      {/* Change password */}
      <div className="card" style={{marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <Ic n="pw" size={16} c="#60a5fa"/>
          <div className="bb" style={{fontSize:15,color:'#60a5fa'}}>Cambiar contraseña</div>
        </div>
        <input type="password" placeholder="Nueva contraseña (mín. 6 caracteres)" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&savePw()}/>
        {pw.length>0&&pw.length<6&&<p style={{fontSize:11,color:'#f87171',marginTop:4}}>Mínimo 6 caracteres</p>}
        {pwErr&&<p style={{fontSize:11,color:'#f87171',marginTop:4}}>{pwErr}</p>}
        {pwSaved&&<p style={{fontSize:12,color:'#4ade80',marginTop:4}}>✓ Contraseña actualizada</p>}
        <button className="bp" onClick={savePw} disabled={pw.length<6} style={{marginTop:10,fontSize:14,padding:'11px'}}>
          Guardar contraseña
        </button>
      </div>

      {/* Language */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{fontSize:11,color:'#8080a0',marginBottom:9,fontWeight:600}}>IDIOMA</div>
        <div style={{display:'flex',gap:9}}>
          {[{id:'es',l:'Español 🇪🇸'},{id:'en',l:'English 🇺🇸'}].map(x=>(
            <button key={x.id} onClick={()=>updateUser({lang:x.id})} style={{flex:1,padding:10,borderRadius:10,cursor:'pointer',fontSize:13,transition:'all .15s',border:`1.5px solid ${(user.lang||'es')===x.id?'#00e676':'#20204a'}`,background:(user.lang||'es')===x.id?'rgba(0,230,118,.08)':'transparent',color:(user.lang||'es')===x.id?'#00e676':'#6b7a99'}}>{x.l}</button>
          ))}
        </div>
      </div>

      {/* Logout — prominent */}
      <button onClick={logout} style={{width:'100%',padding:14,borderRadius:12,border:'1.5px solid rgba(248,113,113,.3)',background:'rgba(248,113,113,.06)',color:'#ef4444',cursor:'pointer',fontWeight:700,fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',gap:10,transition:'all .15s'}}>
        <Ic n="x" size={17} c="#ef4444"/> Cerrar Sesión
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   ADMIN PAGE — full client management
══════════════════════════════════════════════════════ */
function AdminPage(){
  const{tx}=useA();
  const[clients,setClients]=useState(()=>DB.users().filter(u=>u.role!=='admin'));
  const[tab,setTab]=useState('clients');
  const[rf,setRf]=useState({name:'',email:'',phone:'',password:''});
  const[rErr,setRErr]=useState('');const[rOk,setROk]=useState(false);
  const[selC,setSelC]=useState(null);
  const[cTab,setCTab]=useState('account'); // account | bio | nutr | water | train
  const[tDay,setTDay]=useState(null);
  const[cfoods,setCfoods]=useState(()=>DB.cfoods());
  // Docs state
  const[selDoc,setSelDoc]=useState(null);
  const[docUploading,setDocUploading]=useState(false);
  const[docOk,setDocOk]=useState(false);
  const docFileRef=useRef();
  // Notif state
  const[notifText,setNotifText]=useState('');
  const[notifSent,setNotifSent]=useState(false);
  const[cfModal,setCfModal]=useState(false);
  const[cf,setCf]=useState({name:'',calories:'',protein:'',carbs:'',fat:'',fiber:'',sugar:'',sodium:''});
  const[cfErr,setCfErr]=useState('');
  // account tab state
  const[newEmail,setNewEmail]=useState('');
  const[newPw,setNewPw]=useState('');
  const[acSaved,setAcSaved]=useState(false);
  const[subsDate,setSubsDate]=useState('');

  const refresh=()=>setClients(DB.users().filter(u=>u.role!=='admin'));

  const openClient=c=>{
    setSelC(c);setCTab('account');setTDay(null);
    setNewEmail(c.email||'');setNewPw('');
    setSubsDate(c.subscriptionExpiry?c.subscriptionExpiry.split('T')[0]:'');
    setAcSaved(false);
  };

  const toggleEnabled=c=>{
    const updated={...c,enabled:c.enabled===false?true:false};
    DB.setUsers(DB.users().map(u=>u.id===c.id?updated:u));
    refresh();setSelC(updated);
  };

  const saveAccount=()=>{
    if(!selC)return;
    const upd={...selC};
    if(newEmail.trim())upd.email=newEmail.trim();
    if(newPw.length>=6)upd.password=newPw;
    if(subsDate)upd.subscriptionExpiry=new Date(subsDate+'T23:59:59').toISOString();
    else upd.subscriptionExpiry=null;
    DB.setUsers(DB.users().map(u=>u.id===upd.id?upd:u));
    refresh();setSelC(upd);setNewPw('');setAcSaved(true);setTimeout(()=>setAcSaved(false),2500);
  };

  const doRegister=()=>{
    setRErr('');
    if(!rf.name.trim()||!rf.email.trim()||!rf.password){setRErr('Completa todos los campos');return;}
    if(rf.password.length<6){setRErr('Contraseña mínimo 6 caracteres');return;}
    if(DB.users().find(u=>u.email.toLowerCase()===rf.email.toLowerCase().trim())){setRErr('Usuario ya registrado');return;}
    const nu={id:'u_'+Date.now()+'_'+Math.random().toString(36).slice(2,5),email:rf.email.toLowerCase().trim(),password:rf.password,name:rf.name.trim(),phone:rf.phone.trim(),role:'client',lang:'es',enabled:true,subscriptionExpiry:null,createdAt:new Date().toISOString()};
    DB.setUsers([...DB.users(),nu]);
    refresh();setRf({name:'',email:'',phone:'',password:''});
    setROk(true);setTimeout(()=>setROk(false),3500);setTab('clients');
  };

  const delClient=uid=>{
    if(!window.confirm('¿Eliminar este cliente permanentemente?'))return;
    DB.setUsers(DB.users().filter(u=>u.id!==uid));
    refresh();setSelC(null);
  };

  const saveFood=()=>{
    setCfErr('');
    if(!cf.name.trim()||!cf.calories){setCfErr('Nombre y calorías son obligatorios');return;}
    const food={id:'cf_'+Date.now(),name:cf.name.trim(),src:'admin',calories:parseFloat(cf.calories)||0,protein:parseFloat(cf.protein)||0,carbs:parseFloat(cf.carbs)||0,fat:parseFloat(cf.fat)||0,fiber:parseFloat(cf.fiber)||0,sugar:parseFloat(cf.sugar)||0,sodium:parseFloat(cf.sodium)||0};
    const u=[...cfoods,food];setCfoods(u);DB.setCfoods(u);
    setCf({name:'',calories:'',protein:'',carbs:'',fat:'',fiber:'',sugar:'',sodium:''});setCfModal(false);
  };
  const delFood=id=>{const u=cfoods.filter(f=>f.id!==id);setCfoods(u);DB.setCfoods(u);};

  const uploadDoc=async()=>{
    if(!selC)return;
    const input=docFileRef.current;
    if(!input?.files?.[0])return;
    const file=input.files[0];
    if(file.size>3*1024*1024){alert('El archivo supera 3 MB. Por favor comprime el PDF.');return;}
    setDocUploading(true);setDocOk(false);
    const fr=new FileReader();
    fr.onload=ev=>{
      const base64=ev.target.result.split(',')[1];
      const doc={id:'doc_'+Date.now(),name:file.name,size:file.size,data:base64,mime:file.type||'application/pdf',uploadedAt:new Date().toISOString()};
      const updated=[...DB.docs(selC.id),doc];
      DB.setDocs(selC.id,updated);
      DB.pushNotif(selC.id,'📄 Coach subió un nuevo documento: '+file.name,'doc');
      setDocUploading(false);setDocOk(true);setTimeout(()=>setDocOk(false),3000);
    };
    fr.onerror=()=>{setDocUploading(false);alert('Error al leer el archivo.');};
    fr.readAsDataURL(file);
    input.value='';
  };
  const delDoc=(uid,id)=>{
    const updated=DB.docs(uid).filter(d=>d.id!==id);
    DB.setDocs(uid,updated);
  };
  const sendNotif=()=>{
    if(!selC||!notifText.trim())return;
    DB.pushNotif(selC.id,notifText.trim(),'coach');
    setNotifText('');setNotifSent(true);setTimeout(()=>setNotifSent(false),2500);
  };

  const clientTabs=[{id:'account',l:'Cuenta',icon:'user'},{id:'bio',l:'Bio',icon:'activity'},{id:'nutr',l:'Nutrición',icon:'cup'},{id:'water',l:'Agua',icon:'drop'},{id:'train',l:'Entreno',icon:'dumbbell'},{id:'docs',l:'Docs',icon:'filetext'},{id:'notifs',l:'Notifs',icon:'bell'}];

  return(
    <div style={{padding:'16px 16px 90px'}} className="slide">
      <div style={{paddingTop:52,marginBottom:18}}>
        <div className="bb" style={{fontSize:32,color:'#FFB800'}}>{tx('adminTitle')}</div>
        <div style={{fontSize:11,color:'#6b7a99',marginTop:2}}>ONLY FIT GYM PRO · Solo Campeones</div>
      </div>
      {/* Main tabs */}
      <div style={{display:'flex',gap:8,marginBottom:18}}>
        {[{id:'clients',l:tx('clients')+' ('+clients.length+')'},{id:'register',l:tx('regClient')},{id:'foods',l:tx('customFoods')}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'9px 4px',borderRadius:10,cursor:'pointer',fontSize:11,fontWeight:600,transition:'all .15s',border:`1.5px solid ${tab===t.id?'#FFB800':'#20204a'}`,background:tab===t.id?'rgba(255,184,0,.08)':'transparent',color:tab===t.id?'#FFB800':'#6b7a99'}}>{t.l}</button>
        ))}
      </div>

      {/* CLIENTS */}
      {tab==='clients'&&(
        <div>
          {rOk&&<div style={{background:'rgba(74,222,128,.1)',border:'1px solid rgba(74,222,128,.3)',borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:13,color:'#4ade80'}}>✓ Cliente registrado exitosamente</div>}
          {clients.length===0?(<div style={{textAlign:'center',padding:40,color:'#20204a',border:'1px dashed #181838',borderRadius:12}}>{tx('noClients')}</div>):(
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {clients.map(c=>{
                const p=DB.prof(c.id);const mc=calcMacros(p?.bio);
                const enabled=c.enabled!==false;
                const days=daysLeft(c);
                const expired=isExpired(c);
                const statusColor=!enabled?'#6b7a99':expired?'#ef4444':days!==null&&days<=7?'#f59e0b':'#00e676';
                return(
                  <div key={c.id} className="card" style={{cursor:'pointer',opacity:enabled?1:.7}} onClick={()=>openClient(c)}>
                    <div style={{display:'flex',alignItems:'center',gap:11}}>
                      <div style={{position:'relative',flexShrink:0}}>
                        <Avatar name={c.name} size={48}/>
                        <div style={{position:'absolute',bottom:0,right:0,width:13,height:13,borderRadius:'50%',background:statusColor,border:'2px solid #0d0d22'}}/>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</div>
                        <div style={{fontSize:11,color:'#6b7a99',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.email}</div>
                        <div style={{fontSize:10,color:statusColor,marginTop:1}}>
                          {!enabled?tx('disabled'):expired?tx('subscriptionExpired'):days!==null?`${days} ${tx('daysLeft')}`:tx('subscriptionActive')}
                        </div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0}}>
                        {p?.bio?.peso?<><div style={{fontSize:13,fontWeight:700,color:'#00e676'}}>{mc.calories}<span style={{fontSize:9,color:'#6b7a99'}}> kcal</span></div></>:<span style={{fontSize:11,color:'#20204a'}}>Sin datos</span>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* REGISTER */}
      {tab==='register'&&(
        <div className="card">
          <div className="bb" style={{fontSize:20,marginBottom:14}}>{tx('regClient')}</div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <input placeholder={tx('fullName')+' *'} value={rf.name} onChange={e=>setRf(p=>({...p,name:e.target.value}))}/>
            <input placeholder="Usuario / Cédula *" type="text" value={rf.email} onChange={e=>setRf(p=>({...p,email:e.target.value}))}/>
            <input placeholder={tx('phone')} type="tel" value={rf.phone} onChange={e=>setRf(p=>({...p,phone:e.target.value}))}/>
            <input placeholder="Contraseña * (mín. 6)" type="password" value={rf.password} onChange={e=>setRf(p=>({...p,password:e.target.value}))}/>
          </div>
          {rf.password.length>0&&rf.password.length<6&&<p style={{fontSize:11,color:'#f87171',marginTop:4}}>Contraseña muy corta</p>}
          {rErr&&<p style={{color:'#f87171',fontSize:13,marginTop:8}}>{rErr}</p>}
          <button className="bp" onClick={doRegister} style={{marginTop:14,background:'#FFB800',color:'#05050e'}}>{tx('regClient')}</button>
        </div>
      )}

      {/* CUSTOM FOODS */}
      {tab==='foods'&&(
        <div>
          <button className="bp" onClick={()=>setCfModal(true)} style={{background:'#FFB800',color:'#05050e',marginBottom:14}}><Ic n="plus" size={17} c="#05050e"/> {tx('addCustomFood')}</button>
          {cfoods.length===0?(<div style={{textAlign:'center',padding:32,color:'#20204a',border:'1px dashed #181838',borderRadius:12,fontSize:13}}>Sin alimentos personalizados aún</div>):(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {cfoods.map(food=>(
                <div key={food.id} className="card" style={{display:'flex',alignItems:'center',gap:11,padding:'11px 13px'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{food.name}</div>
                    <div style={{fontSize:11,color:'#6b7a99',marginTop:2}}>{food.calories} kcal · P:{food.protein}g · C:{food.carbs}g · G:{food.fat}g</div>
                  </div>
                  <button onClick={()=>delFood(food.id)} className="bg" style={{padding:4,color:'rgba(248,113,113,.5)',flexShrink:0}}><Ic n="trash" size={14}/></button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* CLIENT DETAIL MODAL */}
      <Modal open={!!selC} onClose={()=>{setSelC(null);refresh();}} title={selC?.name||''}>
        {selC&&(
          <div>
            {/* client sub-tabs */}
            <div style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:2}}>
              {clientTabs.map(t=>(
                <button key={t.id} onClick={()=>setCTab(t.id)} style={{flexShrink:0,padding:'7px 12px',borderRadius:9,cursor:'pointer',fontSize:12,fontWeight:600,transition:'all .15s',border:`1.5px solid ${cTab===t.id?'#FFB800':'#20204a'}`,background:cTab===t.id?'rgba(255,184,0,.08)':'transparent',color:cTab===t.id?'#FFB800':'#6b7a99'}}>{t.l}</button>
              ))}
            </div>

            {/* ACCOUNT TAB */}
            {cTab==='account'&&(
              <div>
                <div style={{fontSize:12,color:'#6b7a99',marginBottom:14}}>{selC.email}{selC.phone?' · '+selC.phone:''} · {tx('clientsSince')} {new Date(selC.createdAt).toLocaleDateString()}</div>
                {/* Enable/Disable */}
                <div className="card" style={{marginBottom:12,background:selC.enabled!==false?'rgba(0,230,118,.04)':'rgba(239,68,68,.04)',border:`1px solid ${selC.enabled!==false?'rgba(0,230,118,.2)':'rgba(239,68,68,.2)'}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:selC.enabled!==false?'#00e676':'#ef4444'}}>{selC.enabled!==false?'Cuenta habilitada':'Cuenta deshabilitada'}</div>
                      <div style={{fontSize:11,color:'#6b7a99',marginTop:2}}>El cliente {selC.enabled!==false?'puede':'no puede'} iniciar sesión</div>
                    </div>
                    <button onClick={()=>toggleEnabled(selC)} style={{padding:'9px 16px',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:600,transition:'all .15s',border:`1.5px solid ${selC.enabled!==false?'rgba(239,68,68,.4)':'rgba(0,230,118,.4)'}`,background:'transparent',color:selC.enabled!==false?'#ef4444':'#00e676',display:'flex',alignItems:'center',gap:6}}>
                      <Ic n={selC.enabled!==false?'lock':'unlock'} size={15} c={selC.enabled!==false?'#ef4444':'#00e676'}/>
                      {selC.enabled!==false?tx('disableClient'):tx('enableClient')}
                    </button>
                  </div>
                </div>
                {/* Subscription */}
                <div className="card" style={{marginBottom:12}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}><Ic n="cal" size={16} c="#FFB800"/><div className="bb" style={{fontSize:14,color:'#FFB800'}}>{tx('subscriptionExpiry')}</div></div>
                  <input type="date" value={subsDate} onChange={e=>setSubsDate(e.target.value)} style={{marginBottom:6}}/>
                  <div style={{fontSize:11,color:'#6b7a99'}}>
                    {subsDate?(isExpired(selC)?'⚠️ '+tx('subscriptionExpired'):`📅 ${daysLeft(selC)||'—'} ${tx('daysLeft')}`):'Sin fecha definida (sin límite)'}
                  </div>
                </div>
                {/* Credentials */}
                <div className="card" style={{marginBottom:12}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}><Ic n="pw" size={16} c="#60a5fa"/><div className="bb" style={{fontSize:14,color:'#60a5fa'}}>Credenciales</div></div>
                  <div style={{display:'flex',flexDirection:'column',gap:9}}>
                    <input placeholder="Usuario / Cédula" type="text" value={newEmail} onChange={e=>setNewEmail(e.target.value)}/>
                    <input placeholder="Nueva contraseña (mín. 6)" type="password" value={newPw} onChange={e=>setNewPw(e.target.value)}/>
                    {newPw.length>0&&newPw.length<6&&<p style={{fontSize:11,color:'#f87171'}}>Mínimo 6 caracteres</p>}
                  </div>
                </div>
                {acSaved&&<div style={{background:'rgba(74,222,128,.1)',border:'1px solid rgba(74,222,128,.3)',borderRadius:10,padding:'9px 14px',marginBottom:10,fontSize:13,color:'#4ade80'}}>✓ {tx('changesSaved')}</div>}
                <button className="bp" onClick={saveAccount} style={{marginBottom:10,background:'#FFB800',color:'#05050e'}}><Ic n="check" size={17} c="#05050e"/> Guardar cambios</button>
                <button onClick={()=>delClient(selC.id)} style={{width:'100%',padding:11,borderRadius:10,border:'1px solid rgba(248,113,113,.22)',background:'transparent',color:'#ef4444',cursor:'pointer',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                  <Ic n="trash" size={15} c="#ef4444"/> Eliminar cliente
                </button>
              </div>
            )}

            {/* BIO TAB */}
            {cTab==='bio'&&(
              <div style={{marginTop:-8}}>
                <BioPage uid={selC.id} isAdmin={true} onSaved={()=>refresh()}/>
              </div>
            )}

            {/* NUTRITION TAB */}
            {cTab==='nutr'&&(
              <div style={{marginTop:0}}>
                <div className="bb" style={{fontSize:18,marginBottom:14,color:'#FFB800'}}>Nutrición — {selC.name}</div>
                <NutritionPage uid={selC.id}/>
              </div>
            )}

            {/* WATER TAB */}
            {cTab==='water'&&(
              <div style={{marginTop:0}}>
                <div className="bb" style={{fontSize:18,marginBottom:14,color:'#FFB800'}}>Hidratación — {selC.name}</div>
                <HydrationPage uid={selC.id}/>
              </div>
            )}

            {/* TRAINING TAB */}
            {cTab==='train'&&(
              <div style={{marginTop:0}}>
                {tDay?(
                  <TrainingDay dayKey={tDay} goBack={()=>setTDay(null)} uid={selC.id}/>
                ):(
                  <div>
                    <div className="bb" style={{fontSize:18,marginBottom:14,color:'#FFB800'}}>Entrenamiento — {selC.name}</div>
                    <TrainingPage go={()=>{}} setTDay={setTDay} uid={selC.id}/>
                  </div>
                )}
              </div>
            )}

            {/* DOCS TAB */}
            {cTab==='docs'&&(
              <div>
                <div className="bb" style={{fontSize:18,marginBottom:14,color:'#FFB800'}}>Documentos — {selC.name}</div>
                <p style={{fontSize:12,color:'#6b7a99',marginBottom:12,lineHeight:1.55}}>
                  Sube PDFs de planificaciones, dietas personalizadas, informes, etc. Máx 3 MB por archivo.
                </p>
                <input ref={docFileRef} type="file" accept="application/pdf,.pdf" style={{display:'none'}} onChange={uploadDoc}/>
                <button className="bp" onClick={()=>docFileRef.current.click()} disabled={docUploading}
                  style={{background:'#FFB800',color:'#05050e',marginBottom:12}}>
                  {docUploading?<span className="spin"/>:<><Ic n="filetext" size={17} c="#05050e"/> Subir PDF</>}
                </button>
                {docOk&&<div style={{background:'rgba(74,222,128,.1)',border:'1px solid rgba(74,222,128,.3)',borderRadius:10,padding:'9px 14px',marginBottom:10,fontSize:13,color:'#4ade80'}}>✓ Documento subido y notificado al cliente</div>}
                {(()=>{const docs=DB.docs(selC.id);return docs.length===0?(
                  <div style={{textAlign:'center',padding:28,color:'#20204a',border:'1px dashed #181838',borderRadius:12,fontSize:13}}>Sin documentos cargados</div>
                ):(
                  <div style={{display:'flex',flexDirection:'column',gap:8}}>
                    {docs.map(doc=>(
                      <div key={doc.id} className="card" style={{display:'flex',alignItems:'center',gap:11,padding:'11px 13px'}}>
                        <Ic n="filetext" size={20} c="#FFB800"/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{doc.name}</div>
                          <div style={{fontSize:10,color:'#6b7a99',marginTop:2}}>{Math.round(doc.size/1024)} KB · {new Date(doc.uploadedAt).toLocaleDateString()}</div>
                        </div>
                        <button onClick={()=>delDoc(selC.id,doc.id)} className="bg" style={{padding:4,color:'rgba(248,113,113,.5)',flexShrink:0}}><Ic n="trash" size={14}/></button>
                      </div>
                    ))}
                  </div>
                );})()}
              </div>
            )}

            {/* NOTIFS TAB */}
            {cTab==='notifs'&&(
              <div>
                <div className="bb" style={{fontSize:18,marginBottom:14,color:'#FFB800'}}>Notificaciones — {selC.name}</div>
                {/* Send custom message */}
                <div className="card" style={{marginBottom:14,background:'rgba(255,184,0,.04)',border:'1px solid rgba(255,184,0,.2)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}><Ic n="send" size={15} c="#FFB800"/><div className="bb" style={{fontSize:14,color:'#FFB800'}}>Enviar mensaje al cliente</div></div>
                  <input placeholder='Ej: "Recuerda añadir tu desayuno de hoy"' value={notifText} onChange={e=>setNotifText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendNotif()} style={{marginBottom:8}}/>
                  {notifSent&&<div style={{fontSize:12,color:'#4ade80',marginBottom:6}}>✓ Notificación enviada</div>}
                  <button className="bp" onClick={sendNotif} disabled={!notifText.trim()} style={{background:'#FFB800',color:'#05050e',fontSize:14,padding:'10px'}}>
                    <Ic n="send" size={15} c="#05050e"/> Enviar
                  </button>
                </div>
                {/* Quick templates */}
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:11,color:'#6b7a99',marginBottom:8,fontWeight:600}}>MENSAJES RÁPIDOS</div>
                  <div style={{display:'flex',flexDirection:'column',gap:7}}>
                    {[
                      '⏰ Recuerda registrar tu comida del desayuno',
                      '💧 No olvides cumplir tu meta de hidratación hoy',
                      '💪 Es hora de entrenar, ¡tú puedes!',
                      '📊 Revisé tu progreso, ¡vas muy bien!',
                      '🥗 Recuerda seguir tu plan nutricional hoy',
                      '⚖️ Recuerda pesarte mañana en ayunas',
                    ].map(t=>(
                      <button key={t} onClick={()=>{DB.pushNotif(selC.id,t,'coach');setNotifSent(true);setTimeout(()=>setNotifSent(false),2000);}} style={{textAlign:'left',padding:'9px 14px',borderRadius:10,border:'1px solid #20204a',background:'#0d0d22',color:'#dde0f0',cursor:'pointer',fontSize:12,transition:'all .13s'}}>
                        {t}
                      </button>
                    ))}
                  </div>
                </div>
                {/* Notif history */}
                <div className="bb" style={{fontSize:13,color:'#6b7a99',marginBottom:8,letterSpacing:'.07em'}}>HISTORIAL</div>
                {(()=>{const ns=DB.notifs(selC.id);return ns.length===0?(
                  <div style={{textAlign:'center',padding:20,color:'#20204a',border:'1px dashed #181838',borderRadius:12,fontSize:13}}>Sin notificaciones</div>
                ):(
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    {ns.slice(0,20).map(n=>(
                      <div key={n.id} style={{padding:'9px 13px',background:'#0d0d22',borderRadius:10,border:'1px solid #181838'}}>
                        <div style={{fontSize:12,color:'#dde0f0',lineHeight:1.4}}>{n.text}</div>
                        <div style={{fontSize:10,color:'#6b7a99',marginTop:3}}>{new Date(n.createdAt).toLocaleString()}{n.read?' · Leída':' · No leída'}</div>
                      </div>
                    ))}
                  </div>
                );})()}
              </div>
            )}
          </div>
        )}
      </Modal>

      {/* ADD CUSTOM FOOD MODAL */}
      <Modal open={cfModal} onClose={()=>{setCfModal(false);setCfErr('');}} title={tx('addCustomFood')}>
        <p style={{fontSize:12,color:'#6b7a99',marginBottom:14,lineHeight:1.55}}>Añade alimentos locales o ingredientes. Valores por 100g.</p>
        <div style={{display:'flex',flexDirection:'column',gap:9}}>
          <input placeholder={tx('foodName')+' *'} value={cf.name} onChange={e=>setCf(p=>({...p,name:e.target.value}))}/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
            {[{k:'calories',l:tx('calories')+' (kcal) *'},{k:'protein',l:tx('protein')+' (g)'},{k:'carbs',l:tx('carbs')+' (g)'},{k:'fat',l:tx('fat')+' (g)'},{k:'fiber',l:tx('fiber')+' (g)'},{k:'sugar',l:tx('sugar')+' (g)'},{k:'sodium',l:tx('sodium')+' (mg)'}].map(x=>(
              <div key={x.k}><div style={{fontSize:11,color:'#6b7a99',marginBottom:4,fontWeight:600}}>{x.l}</div><input type="number" value={cf[x.k]} onChange={e=>setCf(p=>({...p,[x.k]:e.target.value}))} placeholder="0" min="0"/></div>
            ))}
          </div>
        </div>
        {cfErr&&<p style={{color:'#f87171',fontSize:13,marginTop:8}}>{cfErr}</p>}
        <button className="bp" onClick={saveFood} style={{marginTop:14,background:'#FFB800',color:'#05050e'}}><Ic n="plus" size={17} c="#05050e"/> {tx('addCustomFood')}</button>
      </Modal>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   NOTIFICATIONS PANEL (client view)
══════════════════════════════════════════════════════ */
function NotificationsPanel({onClose}){
  const{user}=useA();
  const[notifs,setNotifs]=useState(()=>DB.notifs(user.id));
  const[selDocViewer,setSelDocViewer]=useState(null);
  // Re-read on mount to get fresh data
  useEffect(()=>setNotifs(DB.notifs(user.id)),[user.id]);

  const markAllRead=()=>{
    const u=notifs.map(n=>({...n,read:true}));
    DB.setNotifs(user.id,u);setNotifs(u);
  };
  const markOne=(id)=>{
    const u=notifs.map(n=>n.id===id?{...n,read:true}:n);
    DB.setNotifs(user.id,u);setNotifs(u);
  };

  const docs=DB.docs(user.id);
  const nIcon={doc:'📄',bio:'📊',info:'ℹ️',coach:'💬',default:'🔔'};

  if(selDocViewer){
    return(
      <div style={{position:'fixed',inset:0,background:'#05050e',zIndex:1100,display:'flex',flexDirection:'column'}} className="slide">
        <div style={{padding:'52px 16px 14px',background:'#08080f',borderBottom:'1px solid #111128',display:'flex',alignItems:'center',gap:11}}>
          <button onClick={()=>setSelDocViewer(null)} className="bg" style={{padding:5}}><Ic n="back" size={22}/></button>
          <div className="bb" style={{fontSize:18,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{selDocViewer.name}</div>
        </div>
        <iframe
          src={`data:${selDocViewer.mime||'application/pdf'};base64,${selDocViewer.data}`}
          style={{flex:1,border:'none',background:'#fff'}}
          title={selDocViewer.name}
        />
      </div>
    );
  }

  return(
    <div style={{minHeight:'100vh',background:'#05050e',overflowY:'auto',paddingBottom:90}} className="slide">
      <div style={{padding:'52px 18px 22px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <button onClick={onClose} className="bg" style={{padding:'5px 8px'}}><Ic n="back" size={20}/></button>
            <span className="bb" style={{fontSize:22}}>Notificaciones</span>
          </div>
          <button onClick={markAllRead} className="bg" style={{fontSize:12,color:'#6b7a99'}}>Marcar leídas</button>
        </div>

        {/* Docs section */}
        {docs.length>0&&(
          <div style={{marginBottom:16}}>
            <div className="bb" style={{fontSize:13,color:'#FFB800',marginBottom:8,letterSpacing:'.07em'}}>MIS DOCUMENTOS</div>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {docs.map(doc=>(
                <button key={doc.id} onClick={()=>setSelDocViewer(doc)} style={{display:'flex',alignItems:'center',gap:11,padding:'11px 13px',background:'#0d0d22',borderRadius:11,border:'1px solid #181838',cursor:'pointer',textAlign:'left',width:'100%'}}>
                  <Ic n="filetext" size={20} c="#FFB800"/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#dde0f0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{doc.name}</div>
                    <div style={{fontSize:10,color:'#6b7a99',marginTop:2}}>{Math.round(doc.size/1024)} KB · {new Date(doc.uploadedAt).toLocaleDateString()}</div>
                  </div>
                  <Ic n="chevR" size={14} c="#6b7a99"/>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Notifications list */}
        <div className="bb" style={{fontSize:13,color:'#8080a0',marginBottom:8,letterSpacing:'.07em'}}>AVISOS DEL COACH</div>
        {notifs.length===0?(
          <div style={{textAlign:'center',padding:28,color:'#20204a',border:'1px dashed #181838',borderRadius:12,fontSize:13}}>Sin notificaciones</div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            {notifs.map(n=>(
              <div key={n.id} onClick={()=>markOne(n.id)} style={{padding:'11px 13px',background:n.read?'#0d0d22':'rgba(0,230,118,.04)',borderRadius:11,border:`1px solid ${n.read?'#181838':'rgba(0,230,118,.2)'}`,cursor:'pointer',transition:'all .15s'}}>
                <div style={{display:'flex',gap:9,alignItems:'flex-start'}}>
                  <span style={{fontSize:16,lineHeight:1.3,flexShrink:0}}>{nIcon[n.type]||nIcon.default}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,color:'#dde0f0',lineHeight:1.45}}>{n.text}</div>
                    <div style={{fontSize:10,color:'#6b7a99',marginTop:4}}>{new Date(n.createdAt).toLocaleString()}</div>
                  </div>
                  {!n.read&&<div style={{width:8,height:8,borderRadius:'50%',background:'#00e676',marginTop:4,flexShrink:0}}/>}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   ROUTER
══════════════════════════════════════════════════════ */
function Router(){
  const{user}=useA();
  const[pg,setPg]=useState('home');
  const[tDay,setTDay]=useState(null);
  if(!user)return React.createElement(AuthPage);
  const go=p=>setPg(p);
  if(pg==='tday'&&tDay){
    return React.createElement(TrainingDay,{dayKey:tDay,goBack:()=>setPg('train')});
  }
  if(pg==='bio'){
    return(
      <div style={{maxWidth:500,margin:'0 auto',background:'#05050e',minHeight:'100vh'}}>
        <div style={{padding:'52px 16px 14px',background:'#08080f',borderBottom:'1px solid #111128',position:'sticky',top:0,zIndex:60,backdropFilter:'blur(14px)'}}>
          <div style={{display:'flex',alignItems:'center',gap:11}}>
            <button onClick={()=>setPg('prof')} className="bg" style={{padding:5}}><Ic n="back" size={22}/></button>
            <div className="bb" style={{fontSize:22}}>Bioimpedancia</div>
          </div>
        </div>
        <BioPage uid={user.id}/>
        <BottomNav pg="prof" go={go} notifIndicator={false}/>
      </div>
    );
  }
  return(
    <div style={{maxWidth:500,margin:'0 auto',minHeight:'100vh',background:'#05050e',position:'relative'}}>
      {pg==='home'  &&<Dashboard go={go}/>}
      {pg==='nutr'  &&<NutritionPage/>}
      {pg==='water' &&<HydrationPage/>}
      {pg==='train' &&<TrainingPage go={go} setTDay={setTDay}/>}
      {pg==='prof'  &&<ProfilePage go={go}/>}
      {pg==='admin' &&<AdminPage/>}
      {pg==='notifs'&&user?.role!=='admin'&&<NotificationsPanel onClose={()=>go('home')}/>}
      <BottomNav pg={pg} go={go}/>
    </div>
  );
}

function App(){return<Provider><Router/></Provider>;}
window._fbOnReady(function(){ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));});
</script>
</body>
</html>
