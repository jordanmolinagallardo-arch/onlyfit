function daysLeft(user){
  if(!user.subscriptionExpiry)return null;
  const diff=new Date(user.subscriptionExpiry)-new Date();
  return Math.ceil(diff/(1000*60*60*24));
}

let _tessLoad=null;
async function loadTess(){
  if(window.Tesseract)return;
  if(!_tessLoad){
    _tessLoad=new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
      s.onload=res;s.onerror=rej;
      document.head.appendChild(s);
    });
  }
  await _tessLoad;
}

/* Canvas preprocessing — 4 variants for maximum coverage */
function makeVariants(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const W=img.width, H=img.height;
      const scale=Math.max(2,Math.min(4,1800/Math.max(W,H)));
      const w=Math.round(W*scale), h=Math.round(H*scale);
      function makeCanvas(){const c=document.createElement('canvas');c.width=w;c.height=h;return c;}

      // Variant A: high-contrast binarized (dark text on white)
      const cA=makeCanvas(),ctxA=cA.getContext('2d');
      ctxA.fillStyle='#fff';ctxA.fillRect(0,0,w,h);
      ctxA.drawImage(img,0,0,w,h);
      const dA=ctxA.getImageData(0,0,w,h);
      for(let i=0;i<dA.data.length;i+=4){
        const g=0.299*dA.data[i]+0.587*dA.data[i+1]+0.114*dA.data[i+2];
        const v=g<128?0:255;dA.data[i]=dA.data[i+1]=dA.data[i+2]=v;dA.data[i+3]=255;
      }
      ctxA.putImageData(dA,0,0);

      // Variant B: softer threshold 160 (handles grey text)
      const cB=makeCanvas(),ctxB=cB.getContext('2d');
      ctxB.fillStyle='#fff';ctxB.fillRect(0,0,w,h);
      ctxB.drawImage(img,0,0,w,h);
      const dB=ctxB.getImageData(0,0,w,h);
      for(let i=0;i<dB.data.length;i+=4){
        const g=0.299*dB.data[i]+0.587*dB.data[i+1]+0.114*dB.data[i+2];
        const v=g<160?0:255;dB.data[i]=dB.data[i+1]=dB.data[i+2]=v;dB.data[i+3]=255;
      }
      ctxB.putImageData(dB,0,0);

      // Variant C: inverted (light text on dark bg)
      const cC=makeCanvas(),ctxC=cC.getContext('2d');
      ctxC.fillStyle='#000';ctxC.fillRect(0,0,w,h);
      ctxC.drawImage(img,0,0,w,h);
      const dC=ctxC.getImageData(0,0,w,h);
      for(let i=0;i<dC.data.length;i+=4){
        const g=0.299*dC.data[i]+0.587*dC.data[i+1]+0.114*dC.data[i+2];
        const v=g>127?0:255;dC.data[i]=dC.data[i+1]=dC.data[i+2]=v;dC.data[i+3]=255;
      }
      ctxC.putImageData(dC,0,0);

      resolve([cA.toDataURL('image/png'),cB.toDataURL('image/png'),cC.toDataURL('image/png'),dataUrl]);
    };
    img.onerror=()=>resolve([dataUrl]);
    img.src=dataUrl;
  });
}

/*
 * STRUCTURAL BIO PARSER
 * Strategy: the bioimpedance scale image has a predictable GRID layout.
 * We extract ALL numbers from the OCR text, then assign them to fields
 * using a three-layer approach:
 * 1. LABEL MATCH: search for known label strings near each number
 * 2. RANGE FILTER: each field has a known physical range — discard out-of-range values
 * 3. POSITIONAL ORDER: if label fails, use reading order (top-left to bottom-right)
 *    which matches the grid: peso, imc, grasaCorporal, masaMuscular, MB, agua,
 *    masaGrasa, masaMagra, masaOsea, grasaVisceral, proteina, musculoEsq,
 *    grasaSubcutanea, edadCuerpo
 */
const FIELD_DEFS=[
  {k:'peso',           range:[20,300],   labels:['PESO','WEIGHT','PES0']},
  {k:'imc',            range:[10,60],    labels:['IMC','BMI','I.M.C','B.M.I']},
  {k:'grasaCorporal',  range:[3,70],     labels:['% DE GRASA','GRASA CORPORAL','% GRASA','DE GRASA CORPORAL','FAT','BODY FAT']},
  {k:'masaMuscular',   range:[5,100],    labels:['MASA MUSCULAR','MASAMUSCULAR','MUSCLE MASS','MUSCLE']},
  {k:'metabolismoBasal',range:[500,5000],labels:['METABOLISMO BASAL','M.B.','MB','METABOLIC RATE','BASAL METABOLIC','KCAL\n','KCAL ']},
  {k:'agua',           range:[20,80],    labels:['AGUA','WATER','% AGUA','AGUA CORPORAL','BODY WATER']},
  {k:'masaGrasaCorporal',range:[1,150],  labels:['MASA GRASA CORPORAL','MASA GRASA\nCORPORAL','MASA\nGRASA CORPORAL','FAT MASS','BODY FAT MASS']},
  {k:'masaMagraCorporal',range:[10,120], labels:['MASA MAGRA CORPORAL','MASA MAGRA\nCORPORAL','MASA\nMAGRA CORPORAL','LEAN MASS','LBM']},
  {k:'masaOsea',       range:[0.5,10],   labels:['MASA OSEA','MASA ÓSEA','MASA\nOSEA','BONE MASS','BONE']},
  {k:'grasaVisceral',  range:[1,30],     labels:['GRASA VISCERAL','VISCERAL FAT','VISCERAL']},
  {k:'proteina',       range:[3,30],     labels:['PROTEINA','PROTEÍNA','PROTEIN','PROTE']},
  {k:'musculoEsq',     range:[5,80],     labels:['MUSCULO ESQUELETICO','MÚSCULO ESQUELÉTICO','SKELETAL MUSCLE','MASA DE MUSCULO','MUSCULO ESQ','ESQUELETICO']},
  {k:'grasaSubcutanea',range:[3,60],     labels:['GRASA SUBCUTANEA','GRASA SUBCUTÁNEA','SUBCUTANEOUS','SUBCUTANEA']},
  {k:'edadCuerpo',     range:[5,100],    labels:['EDAD DEL CUERPO','EDAD CUERPO','BODY AGE','EDAD\nDEL CUERPO']},
];

function parseBioText(rawText){
  const UP=rawText
    .toUpperCase()
    .replace(/\r\n/g,'\n').replace(/\r/g,'\n')
    .replace(/[|!l]/g,'I')
    .replace(/\u00f3/g,'O').replace(/\u00f1/g,'N')
    .replace(/\u00c9/g,'E').replace(/\u00da/g,'U').replace(/\u00dc/g,'U');

  // Extract all numbers with their positions
  const nums=[];
  const re=/(\d{1,5}[.,]\d{1,2}|\d{1,5})/g;
  let m;
  while((m=re.exec(UP))!==null){
    nums.push({v:parseFloat(m[1].replace(',','.')),pos:m.index,raw:m[1]});
  }

  // Helper: find a label in text, return its end position
  function findLabel(label){
    // Try with spaces compressed
    const compressed=label.replace(/\s+/g,'\\s*');
    const rx=new RegExp(compressed);
    const match=UP.match(rx);
    if(match)return UP.indexOf(match[0])+match[0].length;
    return -1;
  }

  // Helper: find nearest number after a position, within maxDist chars
  function numAfter(startPos,minV,maxV,maxDist=200){
    const candidates=nums.filter(n=>n.pos>startPos&&n.pos<startPos+maxDist&&n.v>=minV&&n.v<=maxV);
    return candidates.length>0?candidates[0].v:null;
  }

  const result={};

  // Layer 1: label-based extraction for each field
  FIELD_DEFS.forEach(({k,range,labels})=>{
    for(const lb of labels){
      const endPos=findLabel(lb);
      if(endPos<0)continue;
      const v=numAfter(endPos,range[0],range[1],150);
      if(v!=null){result[k]=v;break;}
    }
  });

  // Layer 2: positional/structural fallback
  // Numbers in range, sorted by position, can be matched to expected grid order
  // Expected grid reading order for scale shown:
  const gridOrder=['peso','imc','grasaCorporal','masaMuscular','metabolismoBasal','agua',
    'masaGrasaCorporal','masaMagraCorporal','masaOsea','grasaVisceral','proteina',
    'musculoEsq','grasaSubcutanea','edadCuerpo'];

  const usedPos=new Set();
  // Mark positions of found values
  Object.entries(result).forEach(([k,v])=>{
    const n=nums.find(n=>Math.abs(n.v-v)<0.01);
    if(n)usedPos.add(n.pos);
  });

  // For missing fields, try positional approach: pick numbers in reading order
  // that fit within the range of missing fields
  const missing=gridOrder.filter(k=>result[k]==null);
  const available=nums.filter(n=>!usedPos.has(n.pos)).sort((a,b)=>a.pos-b.pos);

  missing.forEach(k=>{
    const def=FIELD_DEFS.find(d=>d.k===k);
    if(!def)return;
    const [minV,maxV]=def.range;
    const match=available.find(n=>n.v>=minV&&n.v<=maxV);
    if(match){
      result[k]=match.v;
      usedPos.add(match.pos);
      const idx=available.indexOf(match);
      available.splice(idx,1);
    }
  });

  // Layer 3: text field — tipo de cuerpo
  const tipoLabels=['TIPO DE CUERPO','TIPO\nDE CUERPO','BODY TYPE'];
  for(const lb of tipoLabels){
    const i=rawText.toUpperCase().indexOf(lb);
    if(i<0)continue;
    const after=rawText.slice(i+lb.length,i+lb.length+120).trim();
    const lines=after.split('\n').map(l=>l.trim()).filter(l=>l&&l.length>2&&!/^\d/.test(l)&&!/^[%.,]/.test(l));
    if(lines[0]){result.tipoCuerpo=lines[0];break;}
  }

  return result;
}

async function runOCRPipeline(dataUrl,onProgress){
  await loadTess();
  const variants=await makeVariants(dataUrl);
  const results=[];
  for(let vi=0;vi<variants.length;vi++){
    onProgress(Math.round((vi/variants.length)*70));
    for(const psm of['6','3','4']){
      try{
        const worker=await window.Tesseract.createWorker('eng',1,{logger:()=>{}});
        await worker.setParameters({tessedit_pageseg_mode:psm});
        const{data}=await worker.recognize(variants[vi]);
        await worker.terminate();
        const parsed=parseBioText(data.text);
        const numFields=Object.keys(parsed).filter(k=>k!=='tipoCuerpo').length;
        results.push({parsed,numFields,text:data.text});
        if(numFields>=8)break; // Good enough, stop this variant
      }catch(e){console.warn('OCR variant failed:',e.message);}
    }
    if(results.some(r=>r.numFields>=8))break;
  }
  onProgress(95);
  // Merge results: for each field, take value from the best result that has it
  const best=results.sort((a,b)=>b.numFields-a.numFields);
  const merged={};
  FIELD_DEFS.forEach(({k})=>{
    for(const r of best){
      if(r.parsed[k]!=null){merged[k]=r.parsed[k];break;}
    }
  });
  // Tipo de cuerpo
  for(const r of best){if(r.parsed.tipoCuerpo){merged.tipoCuerpo=r.parsed.tipoCuerpo;break;}}
  onProgress(100);
  return merged;
}

async function fetchUSDA(q){

async function fetchOFF(q){
  try{
    const c=new AbortController();setTimeout(()=>c.abort(),7000);
    const r=await fetch('https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+'&json=1&page_size=15&action=process&fields=product_name,nutriments,brands',{signal:c.signal});

      if(!kcal)return null;
      const brand=p.brands?' ('+p.brands.split(',')[0].trim()+')':'';
      return{id:'off_'+Math.random().toString(36).slice(2,7),name:p.product_name+brand,src:'OpenFoodFacts',calories:kcal,protein:Math.round((nm['proteins_100g']||0)*10)/10,carbs:Math.round((nm['carbohydrates_100g']||0)*10)/10,fat:Math.round((nm['fat_100g']||0)*10)/10,fiber:Math.round((nm['fiber_100g']||0)*10)/10,sugar:Math.round((nm['sugars_100g']||0)*10)/10,sodium:Math.round((nm['sodium_100g']||0)*1000)};

async function searchFoods(q){

}

function calcMacros(bio){
  if(!bio||!parseFloat(bio.peso))return{calories:2000,protein:150,carbs:200,fat:65,bmr:1600,tdee:2000,lbm:55,method:'—'};
  const w=parseFloat(bio.peso)||70,h=parseFloat(bio.height)||170,age=parseFloat(bio.age)||28;
  const bf=parseFloat(bio.grasaCorporal)||0,gen=bio.gender||'male',act=bio.activity||'moderate',goal=bio.goal||'recomp';
  const directLBM=parseFloat(bio.masaMagraCorporal)||0;
  const lbm=directLBM>5?directLBM:bf>3&&bf<65?w*(1-bf/100):gen==='female'?w*.73:w*.81;
  const scaleBMR=parseFloat(bio.metabolismoBasal)||0;
  let bmr,method;
  if(scaleBMR>700&&scaleBMR<4500){bmr=scaleBMR;method='Escala bioimpedancia';}
  else if(bf>3&&bf<65){bmr=370+21.6*lbm;method='Katch-McArdle';}
  else{bmr=gen==='female'?10*w+6.25*h-5*age-161:10*w+6.25*h-5*age+5;method='Mifflin-St Jeor';}
  const aMap={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very_active:1.9};
  const tdee=bmr*(aMap[act]||1.55);
  let cal,prot,carb,fat;
  if(goal==='fat_loss'){cal=tdee*.80;prot=lbm*2.9;fat=Math.max(lbm*.75,cal*.20/9);carb=(cal-prot*4-fat*9)/4;if(carb<50){carb=50;fat=(cal-prot*4-carb*4)/9;}}
  else if(goal==='muscle_gain'){cal=tdee*1.11;prot=lbm*2.5;fat=lbm*1.0;carb=(cal-prot*4-fat*9)/4;if(carb<120){carb=120;fat=(cal-prot*4-carb*4)/9;}}
  else{cal=tdee;prot=lbm*2.65;fat=lbm*.95;carb=(cal-prot*4-fat*9)/4;if(carb<75){carb=75;fat=(cal-prot*4-carb*4)/9;}}
  return{calories:Math.round(Math.max(1200,cal)),protein:Math.round(Math.max(80,prot)),carbs:Math.round(Math.max(40,carb)),fat:Math.round(Math.max(25,fat)),bmr:Math.round(bmr),tdee:Math.round(tdee),lbm:Math.round(lbm*10)/10,method};
}
function calcHydration(bio){
  const w=parseFloat(bio?.peso)||70,act=bio?.activity||'moderate';
  const aMap={sedentary:33,light:36,moderate:40,active:44,very_active:48};
  return{goal:Math.max(2000,Math.min(Math.round(w*(aMap[act]||40)/50)*50,5500))};
}

   UI PRIMITIVES
══════════════════════════════════════════════════════ */
function Ring({value,max,color,label,size=60}){
  const r=size/2-6.5,circ=2*Math.PI*r,pct=max>0?Math.min(100,value/max*100):0,dash=pct/100*circ;
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1a1a3a" strokeWidth="5"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="5" strokeDasharray={`${dash} ${circ}`} strokeDashoffset={circ*.25} strokeLinecap="round" style={{transition:'stroke-dasharray .55s ease'}}/>
        <text x={size/2} y={size/2+4} textAnchor="middle" fontSize={size*.165} fontWeight="700" fill={color}>{value}</text>
      </svg>
      <span style={{fontSize:10,color:'#6b7a99'}}>{label}</span>
    </div>
  );
}
function Bar({value,max,color='#00e676',h=7}){
  const pct=max>0?Math.min(100,value/max*100):0;
  return(<div style={{background:'#181838',borderRadius:99,height:h,overflow:'hidden'}}><div style={{width:`${pct}%`,height:'100%',background:color,borderRadius:99,transition:'width .55s ease'}}/></div>);
}
function Likert({value,onChange,label}){
  const cols=['#4ade80','#a3e635','#fbbf24','#f97316','#ef4444'];
  return(<div><div style={{fontSize:11,color:'#6b7a99',marginBottom:7}}>{label}</div><div style={{display:'flex',gap:8}}>{[1,2,3,4,5].map(n=><button key={n} className={`lk${value===n?' on':''}`} onClick={()=>onChange(n)} style={value===n?{borderColor:cols[n-1],background:`${cols[n-1]}18`,color:cols[n-1]}:{}}>{n}</button>)}</div></div>);
}
function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.9)',zIndex:999,display:'flex',alignItems:'flex-end'}} onClick={onClose}>
      <div style={{background:'#0c0c20',borderRadius:'22px 22px 0 0',width:'100%',maxHeight:'94vh',overflowY:'auto',padding:'22px 18px 36px',borderTop:'1px solid #181838'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <span className="bb" style={{fontSize:22}}>{title}</span>
          <button onClick={onClose} className="bg" style={{padding:'4px 7px'}}><Ic n="x" size={17}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}
function Tag({children,color='#00e676',small}){return<span className="tag" style={{background:`${color}1a`,color,fontSize:small?10:12,padding:small?'2px 8px':'3px 11px'}}>{children}</span>;}
function Avatar({name,size=46,uid,onClick}){
  const cols=['#00e676','#4ade80','#60a5fa','#a78bfa','#f59e0b','#fb923c','#f43f5e','#38bdf8'];
  const c=cols[(name||'?').charCodeAt(0)%cols.length];
  const photo=uid?DB.photo(uid):null;
  const base={width:size,height:size,borderRadius:'50%',flexShrink:0,overflow:'hidden',cursor:onClick?'pointer':'default',position:'relative'};
  if(photo){
    return<div style={base} onClick={onClick}>
      <img src={photo} alt={name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
      {onClick&&<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.4)',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .18s'}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}><Ic n="camera" size={size*.3} c="#fff"/></div>}
    </div>;
  }
  return<div style={{...base,background:`linear-gradient(135deg,${c},${c}70)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.36,fontWeight:700,color:'#05050e'}} onClick={onClick}>
    {(name||'?').charAt(0).toUpperCase()}
    {onClick&&<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.4)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .18s'}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}><Ic n="camera" size={size*.3} c="#fff"/></div>}
  </div>;
}
function NI({label,value,onChange,style:s}){
  return(<div style={s}><div style={{fontSize:11,color:'#6b7a99',marginBottom:4,fontWeight:600}}>{label}</div><input type="number" value={value||''} onChange={e=>onChange(e.target.value)} placeholder="—" style={{padding:'9px 12px',fontSize:14}}/></div>);
}
function FI({label,children}){
  return(<div style={{marginBottom:12}}><div style={{fontSize:11,color:'#6b7a99',marginBottom:5,fontWeight:600,letterSpacing:'.04em'}}>{label}</div>{children}</div>);
}

/* ══════════════════════════════════════════════════════
   AUTH PAGE
══════════════════════════════════════════════════════ */
function AuthPage(){
  const{tx,login}=useA();
  const[mode,setMode]=useState('login');
  const[email,setEmail]=useState('');
  const[pw,setPw]=useState('');
  const[showPw,setShowPw]=useState(false);
  const[recEmail,setRecEmail]=useState('');
  const[recCode,setRecCode]=useState('');
  const[recInput,setRecInput]=useState('');
  const[recPw,setRecPw]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);

  const doLogin=async()=>{
    setErr('');setBusy(true);
    try{
      const u=login(email,pw);
      if(isExpired(u)){DB.setSess(null);throw new Error('expired');}
    }catch(e){
      setErr(e.message==='expired'?tx('expiredMsg'):tx('invalidCreds'));
    }
    setBusy(false);
  };
  const sendCode=()=>{
    setErr('');
    const u=DB.users().find(x=>x.email.toLowerCase()===recEmail.toLowerCase().trim());
    if(!u){setErr('No existe cuenta con ese usuario.');return;}
    const code=String(100000+Math.floor(Math.random()*900000));
    DB.setRec(recEmail.trim(),{code,uid:u.id,exp:Date.now()+600000});
    setRecCode(code);setMode('code');
  };
  const verifyCode=()=>{
    setErr('');
    const r=DB.rec(recEmail.trim());
    if(!r||Date.now()>r.exp){setErr(tx('codeExp'));DB.delRec(recEmail.trim());return;}
    if(recInput.trim()!==r.code){setErr(tx('codeWrong'));return;}
    setMode('newpw');
  };
  const setNewPw=()=>{
    setErr('');
    if(recPw.length<6){setErr('Mínimo 6 caracteres');return;}
    const r=DB.rec(recEmail.trim());
    if(!r){setErr('Sesión expirada');setMode('forgot');return;}
    DB.setUsers(DB.users().map(u=>u.id===r.uid?{...u,password:recPw}:u));
    DB.delRec(recEmail.trim());
    setMode('login');setRecCode('');setRecInput('');setRecPw('');
  };

  const isExpiredMsg=err===tx('expiredMsg');

  return(
    <div style={{minHeight:'100vh',background:'#05050e',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px 18px',overflow:'hidden',position:'relative'}}>
      <div style={{position:'fixed',top:-150,right:-100,width:400,height:400,borderRadius:'50%',background:'radial-gradient(circle,rgba(0,230,118,.06) 0%,transparent 65%)',pointerEvents:'none'}}/>
      <div style={{width:'100%',maxWidth:380}} className="slide">
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:76,height:76,background:'rgba(255,184,0,.08)',borderRadius:22,marginBottom:14,border:'1.5px solid rgba(255,184,0,.2)'}}>
            <Ic n="trophy" size={38} c="#FFB800"/>
          </div>
          <div className="bb" style={{fontSize:22,color:'#FFB800',lineHeight:1.1,letterSpacing:'.07em'}}>ONLY FIT GYM PRO APP</div>
          <div style={{fontSize:12,color:'rgba(255,184,0,.5)',marginTop:5,fontWeight:700,letterSpacing:'.18em'}}>SOLO CAMPEONES</div>
        </div>

        <div className="card" style={{background:'#0c0c20',border:'1px solid #181838'}}>
          {mode==='login'&&(
            <div>
              <div className="bb" style={{fontSize:28,marginBottom:18}}>{tx('login')}</div>
              {isExpiredMsg&&(
                <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.3)',borderRadius:12,padding:'12px 14px',marginBottom:14,fontSize:12,color:'#f87171',lineHeight:1.6}}>
                  {err}
                </div>
              )}
              <div style={{display:'flex',flexDirection:'column',gap:11}}>
                <input placeholder={tx('email')} type="text" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
                <div style={{position:'relative'}}>
                  <input placeholder={tx('password')} type={showPw?'text':'password'} value={pw} onChange={e=>setPw(e.target.value)} style={{paddingRight:44}} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
                  <button onClick={()=>setShowPw(!showPw)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'#2e2e5a',padding:4}}><Ic n="eye" size={16}/></button>
                </div>
              </div>
              {!isExpiredMsg&&err&&<p style={{color:'#f87171',fontSize:13,marginTop:8}}>{err}</p>}
              <button className="bp" onClick={doLogin} disabled={busy} style={{marginTop:18,background:'#FFB800',color:'#05050e'}}>
                {busy?<span className="spin"/>:tx('login')}
              </button>
              <button className="bg" onClick={()=>{setMode('forgot');setErr('');setRecEmail('');}} style={{width:'100%',justifyContent:'center',marginTop:10,fontSize:13,color:'#6b7a99'}}>{tx('forgotPw')}</button>
            </div>
          )}
          {mode==='forgot'&&(
            <div>
              <div className="bb" style={{fontSize:26,marginBottom:8}}>{tx('recover')}</div>
              <p style={{fontSize:12,color:'#6b7a99',marginBottom:14,lineHeight:1.6}}>Ingresa tu número de usuario (cédula) y recibirás un código.</p>
              <input placeholder={tx('email')} type="text" value={recEmail} onChange={e=>setRecEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendCode()}/>
              {err&&<p style={{color:'#f87171',fontSize:13,marginTop:8}}>{err}</p>}
              <button className="bp" onClick={sendCode} style={{marginTop:14}}>{tx('sendCode')}</button>
              <button className="bg" onClick={()=>{setMode('login');setErr('');}} style={{width:'100%',justifyContent:'center',marginTop:8,fontSize:13,color:'#6b7a99'}}>{tx('cancel')}</button>
            </div>
          )}
          {mode==='code'&&(
            <div>
              <div className="bb" style={{fontSize:26,marginBottom:10}}>{tx('codeTitle')}</div>
              <div style={{background:'rgba(0,230,118,.06)',border:'1px solid rgba(0,230,118,.2)',borderRadius:12,padding:'12px 16px',marginBottom:14}}>
                <div style={{fontSize:11,color:'#6b7a99',marginBottom:5}}>📱 Código (simulación SMS)</div>
                <div className="bb" style={{fontSize:38,color:'#00e676',letterSpacing:'8px'}}>{recCode}</div>
                <div style={{fontSize:10,color:'#22224a',marginTop:3}}>{tx('codeNote')}</div>
              </div>
              <input placeholder="Código de 6 dígitos" value={recInput} onChange={e=>setRecInput(e.target.value)} style={{letterSpacing:'6px',fontSize:20,textAlign:'center'}} maxLength={6}/>
              {err&&<p style={{color:'#f87171',fontSize:13,marginTop:8}}>{err}</p>}
              <button className="bp" onClick={verifyCode} style={{marginTop:14}}>{tx('verifyCode')}</button>
              <button className="bg" onClick={()=>{setMode('forgot');setErr('');}} style={{width:'100%',justifyContent:'center',marginTop:8,fontSize:13,color:'#6b7a99'}}>{tx('cancel')}</button>
            </div>
          )}
          {mode==='newpw'&&(
            <div>
              <div className="bb" style={{fontSize:26,marginBottom:10}}>{tx('newPw')}</div>
              <p style={{fontSize:12,color:'#6b7a99',marginBottom:14}}>Elige tu nueva contraseña (mínimo 6 caracteres).</p>
              <input type="password" placeholder={tx('newPw')} value={recPw} onChange={e=>setRecPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&setNewPw()}/>
              {recPw.length>0&&recPw.length<6&&<p style={{color:'#f87171',fontSize:11,marginTop:4}}>Mínimo 6 caracteres</p>}
              {err&&<p style={{color:'#f87171',fontSize:13,marginTop:8}}>{err}</p>}
              <button className="bp" onClick={setNewPw} style={{marginTop:14}} disabled={recPw.length<6}>{tx('setPw')}</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

              <div className="bb" style={{fontSize:34,lineHeight:1}}>{Math.round(cons.cal)}<span style={{fontSize:14,fontFamily:'DM Sans',color:'#6b7a99'}}> / {macro.calories} kcal</span></div>
            </div>
            {(()=>{const r=28,circ=2*Math.PI*r,d=calPct/100*circ;return(<svg width="70" height="70"><circle cx="35" cy="35" r={r} fill="none" stroke="#181838" strokeWidth="5.5"/><circle cx="35" cy="35" r={r} fill="none" stroke={calPct>=100?'#ef4444':gc} strokeWidth="5.5" strokeDasharray={`${d} ${circ}`} strokeDashoffset={circ*.25} strokeLinecap="round" style={{transition:'stroke-dasharray .6s'}}/><text x="35" y="40" textAnchor="middle" fontSize="12" fontWeight="700" fill={calPct>=100?'#ef4444':gc}>{Math.round(calPct)}%</text></svg>);})()}
          </div>
          <Bar value={cons.cal} max={macro.calories} color={calPct>=100?'#ef4444':gc}/>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:13,gap:7}}>
            {[{l:tx('protein'),v:Math.round(cons.p),m:macro.protein,c:'#4ade80'},{l:tx('carbs'),v:Math.round(cons.c),m:macro.carbs,c:'#60a5fa'},{l:tx('fat'),v:Math.round(cons.f),m:macro.fat,c:'#f59e0b'}].map(x=>(
              <div key={x.l} style={{flex:1}}><div style={{fontSize:10,color:'#6b7a99',marginBottom:3}}>{x.l}</div><div style={{fontSize:13,fontWeight:600,color:x.c,marginBottom:3}}>{x.v}g</div><Bar value={x.v} max={x.m} color={x.c} h={3}/></div>
            ))}
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          <button onClick={()=>go('water')} style={{background:'rgba(96,165,250,.05)',border:'1px solid rgba(96,165,250,.16)',borderRadius:14,padding:14,textAlign:'left',cursor:'pointer'}}>
            <Ic n="drop" size={22} c="#60a5fa"/>
            <div style={{marginTop:9,fontSize:13,fontWeight:600}}>{tx('hydration')}</div>
            <div style={{fontSize:11,color:'#6b7a99',marginTop:2,marginBottom:5}}>{(wCons/1000).toFixed(1)}L / {(hyd.goal/1000).toFixed(1)}L</div>
            <Bar value={wCons} max={hyd.goal} color="#60a5fa" h={3}/>
          </button>
          <button onClick={()=>go('train')} style={{background:'rgba(245,158,11,.05)',border:'1px solid rgba(245,158,11,.16)',borderRadius:14,padding:14,textAlign:'left',cursor:'pointer'}}>
            <Ic n="dumbbell" size={22} c="#f59e0b"/>
            <div style={{marginTop:9,fontSize:13,fontWeight:600}}>{tx('training')}</div>
            <div style={{fontSize:11,color:'#6b7a99',marginTop:2}}>{todayPlan?.muscle||'Sin asignar'}</div>
          </button>
        </div>

        {prof.bio?.peso?(
          <button onClick={()=>go('bio')} className="card" style={{width:'100%',textAlign:'left',cursor:'pointer',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 16px',background:'#0d0d22'}}>
            <div style={{display:'flex',gap:18}}>
              {[{l:'Peso',v:(prof.bio.peso||'—')+'kg',c:'#4ade80'},{l:'Grasa',v:(prof.bio.grasaCorporal||'—')+'%',c:'#f97316'},{l:'Músculo',v:(prof.bio.masaMuscular||'—')+'kg',c:'#a78bfa'}].map(x=>(
                <div key={x.l}><div style={{fontSize:15,fontWeight:700,color:x.c}}>{x.v}</div><div style={{fontSize:9,color:'#6b7a99'}}>{x.l}</div></div>
              ))}
            </div>
            <Ic n="chevR" size={15} c="#2e2e5a"/>
          </button>
        ):(
          <button onClick={()=>go('bio')} style={{width:'100%',textAlign:'left',cursor:'pointer',marginBottom:12,border:'1px dashed #20204a',borderRadius:14,background:'transparent',padding:16,display:'flex',alignItems:'center',gap:14}}>
            <Ic n="activity" size={24} c="#00e676"/>
            <div><div style={{fontSize:14,fontWeight:500}}>Agregar Bioimpedancia</div><div style={{fontSize:11,color:'#6b7a99',marginTop:2}}>Configura medidas y objetivos</div></div>
          </button>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   BIO PAGE
══════════════════════════════════════════════════════ */
const BIO_FIELDS=[
  {k:'peso'},{k:'imc'},{k:'grasaCorporal'},{k:'masaMuscular'},
  {k:'metabolismoBasal'},{k:'agua'},{k:'masaGrasaCorporal'},{k:'masaMagraCorporal'},
  {k:'masaOsea'},{k:'grasaVisceral'},{k:'proteina'},{k:'musculoEsq'},
  {k:'grasaSubcutanea'},{k:'edadCuerpo'},
];

function BioPage({uid:uidProp,isAdmin,onSaved}){
  const{user,tx}=useA();
  const uid=uidProp||user.id;
  const saved0=DB.prof(uid)?.bio||{};
  const[bio,setBio]=useState({goal:'recomp',activity:'moderate',gender:'male',height:'',age:'',...saved0});
  const[savedOk,setSavedOk]=useState(false);
  const[imgPrev,setImgPrev]=useState(null);
  const[ocrSt,setOcrSt]=useState('');
  const[ocrPct,setOcrPct]=useState(0);
  const[ocrFields,setOcrFields]=useState(0);
  const fileRef=useRef();
  const upd=(k,v)=>setBio(b=>({...b,[k]:v}));

  const handleFile=e=>{
    const file=e.target.files?.[0];if(!file)return;
    const fr=new FileReader();
    fr.onload=ev=>{setImgPrev(ev.target.result);setOcrSt('');setOcrFields(0);};
    fr.readAsDataURL(file);
    e.target.value='';
  };

  const runOCR=async()=>{
    if(!imgPrev)return;
    setOcrSt('loading');setOcrPct(0);setOcrFields(0);
    try{
      const parsed=await runOCRPipeline(imgPrev,pct=>setOcrPct(pct));
      const updates={};
      FIELD_DEFS.forEach(({k})=>{if(parsed[k]!=null)updates[k]=String(parsed[k]);});
      if(parsed.tipoCuerpo)updates.tipoCuerpo=parsed.tipoCuerpo;
      const numFilled=Object.keys(updates).filter(k=>k!=='tipoCuerpo').length;
      setOcrFields(numFilled);
      if(numFilled>=1){
        setBio(b=>({...b,...updates}));
        setOcrSt(numFilled>=6?'done':'partial');
      }else{
        setOcrSt('fail');
      }
    }catch(e){
      console.warn('OCR pipeline error:',e.message);
      setOcrSt('fail');
    }
  };

  const save=()=>{
    const p=DB.prof(uid);
    DB.setProf(uid,{...p,bio:{...bio,updatedAt:new Date().toISOString()}});
    setSavedOk(true);setTimeout(()=>setSavedOk(false),3000);
    // Auto-notify client when admin edits their bio
    if(isAdmin&&uid){
      DB.pushNotif(uid,'📊 Coach actualizó tu perfil de bioimpedancia','bio');
    }
    if(onSaved)onSaved();
  };

  const m=calcMacros(bio);
  const gc={fat_loss:'#f97316',muscle_gain:'#00e676',recomp:'#a78bfa'}[bio.goal]||'#00e676';

  return(
    <div style={{padding:'16px 16px 90px'}} className="slide">
      {!isAdmin&&<div><div className="bb" style={{fontSize:32,paddingTop:52,marginBottom:3}}>{tx('updateBio')}</div><div style={{fontSize:11,color:'#6b7a99',marginBottom:18}}>{m.method} · IFBB/NPC 2024</div></div>}

      {/* OCR CARD */}
      <div className="card" style={{marginBottom:16,background:'rgba(96,165,250,.04)',border:'1px solid rgba(96,165,250,.2)'}}>
        <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:10}}>
          <Ic n="camera" size={18} c="#60a5fa"/>
          <div className="bb" style={{fontSize:15,color:'#60a5fa'}}>Análisis automático de imagen</div>
        </div>
        <p style={{fontSize:12,color:'#6b7a99',marginBottom:12,lineHeight:1.55}}>
          Sube la foto del examen y el sistema extrae todos los datos automáticamente mediante OCR en múltiples pasadas con preprocesamiento de imagen.
        </p>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:'none'}}/>
        {!imgPrev?(
          <button className="bs" onClick={()=>fileRef.current.click()} style={{width:'100%',justifyContent:'center',padding:'12px',borderColor:'rgba(96,165,250,.35)',color:'#60a5fa'}}>
            <Ic n="camera" size={17} c="#60a5fa"/> {tx('uploadImg')}
          </button>
        ):(
          <div>
            <div style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:10}}>
              <img src={imgPrev} alt="bio" style={{width:90,height:90,objectFit:'cover',borderRadius:10,border:'1px solid #20204a',flexShrink:0}}/>
              <div style={{flex:1}}>
                {ocrSt===''&&<p style={{fontSize:12,color:'#6b7a99',marginBottom:8}}>Imagen lista. Presiona Analizar.</p>}
                {(ocrSt==='loading'||ocrSt==='analyzing')&&(
                  <div>
                    <p style={{fontSize:12,color:'#60a5fa',marginBottom:6}} className="pulse">{ocrSt==='loading'?tx('ocrLoading'):tx('analyzing')+' '+ocrPct+'%'}</p>
                    <Bar value={ocrPct} max={100} color="#60a5fa" h={4}/>
                  </div>
                )}
                {ocrSt==='done'&&<p style={{fontSize:12,color:'#4ade80',marginBottom:6}}>✓ {tx('ocrDone')} ({ocrFields} campos)</p>}
                {ocrSt==='partial'&&<p style={{fontSize:12,color:'#f59e0b',marginBottom:6}}>⚠️ {tx('ocrPartial')} ({ocrFields} campos). Revisa.</p>}
                {ocrSt==='fail'&&<p style={{fontSize:12,color:'#f87171',marginBottom:6}}>{tx('ocrFail')}</p>}
                <div style={{display:'flex',gap:8,marginTop:6}}>
                  {(ocrSt===''||ocrSt==='done'||ocrSt==='partial'||ocrSt==='fail')&&(
                    <button className="bp" onClick={runOCR} style={{fontSize:13,padding:'8px 14px',borderRadius:9,background:'#60a5fa'}}>
                      <Ic n="camera" size={14} c="#05050e"/> Analizar
                    </button>
                  )}
                  <button className="bg" onClick={()=>{setImgPrev(null);setOcrSt('');setOcrFields(0);}} style={{padding:'6px 10px'}}><Ic n="x" size={14}/></button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* RESULT PREVIEW */}
      {bio.peso&&(
        <div className="card" style={{background:`linear-gradient(135deg,rgba(0,230,118,.03),rgba(5,5,14,.95))`,border:`1px solid ${gc}22`,marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-around',marginBottom:12}}>
            {[{l:tx('bmrLabel'),v:m.bmr,c:'#60a5fa'},{l:tx('tdeeLabel'),v:m.tdee,c:'#f59e0b'},{l:tx('calories'),v:m.calories,c:gc}].map(x=>(
              <div key={x.l} style={{textAlign:'center'}}><div className="bb" style={{fontSize:26,color:x.c}}>{x.v}</div><div style={{fontSize:9,color:'#6b7a99'}}>kcal</div><div style={{fontSize:10,color:'#28285a'}}>{x.l}</div></div>
            ))}
          </div>
          <div style={{borderTop:'1px solid #181838',paddingTop:11,display:'flex',justifyContent:'space-around'}}>
            {[{l:'Prot',v:m.protein+'g',c:'#4ade80'},{l:'Carb',v:m.carbs+'g',c:'#60a5fa'},{l:'Gras',v:m.fat+'g',c:'#f59e0b'},{l:'MLM',v:m.lbm+'kg',c:'#a78bfa'}].map(x=>(
              <div key={x.l} style={{textAlign:'center'}}><div style={{fontSize:14,fontWeight:700,color:x.c}}>{x.v}</div><div style={{fontSize:9,color:'#6b7a99'}}>{x.l}</div></div>
            ))}
          </div>
          <div style={{textAlign:'center',marginTop:8,fontSize:10,color:'#22224a'}}>Método: {m.method}</div>
        </div>
      )}

      {/* GOAL */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,color:'#8080a0',marginBottom:9,fontWeight:600,letterSpacing:'.06em'}}>{tx('goal').toUpperCase()}</div>
        <div style={{display:'flex',gap:9}}>
          {[{id:'fat_loss',e:'🔥',c:'#f97316'},{id:'muscle_gain',e:'💪',c:'#00e676'},{id:'recomp',e:'⚡',c:'#a78bfa'}].map(g=>(
            <button key={g.id} onClick={()=>upd('goal',g.id)} style={{flex:1,padding:'12px 6px',borderRadius:12,cursor:'pointer',lineHeight:1.5,transition:'all .18s',border:`2px solid ${bio.goal===g.id?g.c:'#20204a'}`,background:bio.goal===g.id?`${g.c}10`:'transparent',color:bio.goal===g.id?g.c:'#6b7a99',fontSize:11,fontWeight:600}}>
              <div style={{fontSize:20,marginBottom:4}}>{g.e}</div>{tx(g.id)}
            </button>
          ))}
        </div>
      </div>

      {/* 14 NUMERIC FIELDS in 2 columns */}
      <div className="card" style={{marginBottom:12}}>
        <div className="bb" style={{fontSize:12,color:'#6b7a99',marginBottom:14,letterSpacing:'.09em'}}>DATOS DEL EXAMEN</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {BIO_FIELDS.map(({k})=><NI key={k} label={tx(k)} value={bio[k]} onChange={v=>upd(k,v)}/>)}
        </div>
        <div style={{marginTop:10}}>
          <div style={{fontSize:11,color:'#6b7a99',marginBottom:4,fontWeight:600}}>{tx('tipoCuerpo')}</div>
          <input type="text" value={bio.tipoCuerpo||''} onChange={e=>upd('tipoCuerpo',e.target.value)} placeholder="Ej: Músculo estándar"/>
        </div>
      </div>

      {/* METABOLIC */}
      <div className="card" style={{marginBottom:18}}>
        <div className="bb" style={{fontSize:12,color:'#6b7a99',marginBottom:12,letterSpacing:'.09em'}}>PERFIL METABÓLICO</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          <NI label={tx('height')} value={bio.height} onChange={v=>upd('height',v)}/>
          <NI label={tx('age')} value={bio.age} onChange={v=>upd('age',v)}/>
        </div>
        <FI label={tx('gender')}>
          <div style={{display:'flex',gap:9}}>
            {[{id:'male',l:tx('male')},{id:'female',l:tx('female')}].map(g=>(
              <button key={g.id} onClick={()=>upd('gender',g.id)} style={{flex:1,padding:10,borderRadius:10,cursor:'pointer',fontWeight:500,fontSize:13,transition:'all .15s',border:`1.5px solid ${bio.gender===g.id?'#00e676':'#20204a'}`,background:bio.gender===g.id?'rgba(0,230,118,.08)':'transparent',color:bio.gender===g.id?'#00e676':'#6b7a99'}}>{g.l}</button>
            ))}
          </div>
        </FI>
        <FI label={tx('actLevel')}>
          <select value={bio.activity||'moderate'} onChange={e=>upd('activity',e.target.value)}>
            {['sedentary','light','moderate','active','very_active'].map(a=><option key={a} value={a}>{tx(a)}</option>)}
          </select>
        </FI>
      </div>

      <button className="bp" onClick={save} style={{background:savedOk?'#4ade80':'#00e676',marginBottom:8}}>
        {savedOk?<span style={{display:'flex',alignItems:'center',gap:8}}><Ic n="check" size={17} c="#05050e"/> Guardado</span>:tx('save')}
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   NUTRITION
══════════════════════════════════════════════════════ */
const SRC_C={local:'#22224a',USDA:'#16a34a',OpenFoodFacts:'#e07b00',admin:'#FFB800'};
const SRC_L={local:'Local',USDA:'USDA',OpenFoodFacts:'OFF',admin:'Coach'};

function NutritionPage({uid:uidProp}){
  const{user,tx}=useA();
  const uid=uidProp||user.id;
  const today=new Date().toISOString().split('T')[0];
  const[meals,setMeals]=useState(()=>DB.nlog(uid,today));
  const[q,setQ]=useState('');
  const[results,setResults]=useState([]);
  const[loading,setLoading]=useState(false);
  const[sel,setSel]=useState(null);
  const[amt,setAmt]=useState('100');
  const prof=DB.prof(uid);
  const macro=calcMacros(prof.bio);
  const cons=useMemo(()=>meals.reduce((a,m)=>({cal:a.cal+m.calories*m.amount/100,p:a.p+m.protein*m.amount/100,c:a.c+m.carbs*m.amount/100,f:a.f+m.fat*m.amount/100,fi:a.fi+(m.fiber||0)*m.amount/100}),{cal:0,p:0,c:0,f:0,fi:0}),[meals]);
  const calPct=macro.calories>0?Math.min(100,cons.cal/macro.calories*100):0;
  const rem=macro.calories-Math.round(cons.cal);
  const doSearch=async()=>{
    if(q.trim().length<2)return;
    setLoading(true);setResults([]);
    const r=await searchFoods(q);
    setResults(r);setLoading(false);
  };
  const addFood=()=>{
    const a=parseFloat(amt);if(!sel||!a||a<=0)return;
    const entry={...sel,amount:a,logId:`${Date.now()}_${Math.random().toString(36).slice(2,5)}`,addedAt:new Date().toISOString()};
    const u=[...meals,entry];setMeals(u);DB.setNlog(uid,today,u);
    setSel(null);setResults([]);setQ('');setAmt('100');
  };
  const rm=id=>{const u=meals.filter(m=>m.logId!==id);setMeals(u);DB.setNlog(uid,today,u);};

  return(
    <div style={{padding:'16px 16px 90px'}} className="slide">
      {!uidProp&&<div className="bb" style={{fontSize:32,paddingTop:52,marginBottom:14}}>{tx('nutrition')}</div>}
      <div className="card" style={{background:'rgba(0,230,118,.03)',border:'1px solid rgba(0,230,118,.13)',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:11}}>
          <div>
            <div style={{fontSize:11,color:'#6b7a99'}}>{tx('consumed')}</div>
            <div className="bb" style={{fontSize:36,color:'#00e676',lineHeight:1}}>{Math.round(cons.cal)}</div>
            <div style={{fontSize:11,color:'#6b7a99'}}>{tx('of')} {macro.calories} kcal</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11,color:'#6b7a99'}}>{tx('remaining')}</div>
            <div className="bb" style={{fontSize:26,color:rem<0?'#ef4444':'#dde0f0',lineHeight:1}}>{Math.abs(rem)}</div>
            <div style={{fontSize:11,color:rem<0?'#ef4444':'#6b7a99'}}>kcal{rem<0?' (exceso)':''}</div>
          </div>
        </div>
        <Bar value={cons.cal} max={macro.calories} color={calPct>=100?'#ef4444':'#00e676'}/>
        <div style={{display:'flex',justifyContent:'space-around',marginTop:14,gap:4}}>
          <Ring value={Math.round(cons.p)} max={macro.protein} color="#4ade80" label={tx('protein')} size={58}/>
          <Ring value={Math.round(cons.c)} max={macro.carbs}   color="#60a5fa" label={tx('carbs')}   size={58}/>
          <Ring value={Math.round(cons.f)} max={macro.fat}     color="#f59e0b" label={tx('fat')}     size={58}/>
          <Ring value={Math.round(cons.fi)} max={30}           color="#a78bfa" label={tx('fiber')}   size={58}/>
        </div>
      </div>
      <div style={{display:'flex',gap:9,marginBottom:4}}>
        <input placeholder={tx('searchFood')} value={q} onChange={e=>{setQ(e.target.value);if(!e.target.value.trim()){setResults([]);setSel(null);}}} onKeyDown={e=>e.key==='Enter'&&doSearch()} style={{flex:1}}/>
        <button className="bs" onClick={doSearch} style={{padding:'10px 15px',flexShrink:0}}><Ic n="search" size={16}/></button>
      </div>
      <div style={{fontSize:10,color:'#18183a',marginBottom:10}}>USDA FoodData · Open Food Facts · Local · Coach</div>
      {loading&&<div style={{textAlign:'center',padding:12,color:'#6b7a99',fontSize:13}} className="pulse">{tx('searching')}</div>}
      {results.length>0&&q.trim().length>0&&(
        <div className="card" style={{marginBottom:12,padding:0,overflow:'hidden'}}>
          {results.map((r,i)=>(
            <div key={r.id||i} onClick={()=>{setSel(r);setAmt('100');}} style={{padding:'9px 14px',borderBottom:i<results.length-1?'1px solid #111128':'none',cursor:'pointer',background:sel?.id===r.id?'rgba(0,230,118,.06)':'transparent',transition:'background .12s'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                <div style={{fontSize:13,fontWeight:500,flex:1,lineHeight:1.3}}>{r.name}</div>
                {r.src&&<span style={{fontSize:9,background:SRC_C[r.src]||'#181838',color:'#dde0f0',padding:'2px 6px',borderRadius:5,flexShrink:0,fontWeight:600}}>{SRC_L[r.src]||r.src}</span>}
              </div>
              <div style={{fontSize:11,color:'#6b7a99',marginTop:2}}>{r.calories} kcal · P:{r.protein}g · C:{r.carbs}g · G:{r.fat}g <span style={{color:'#20204a'}}>/100g</span></div>
            </div>
          ))}
        </div>
      )}
      {sel&&(
        <div className="card" style={{marginBottom:14,border:'1px solid rgba(0,230,118,.22)',background:'rgba(0,230,118,.03)'}}>
          <div style={{display:'flex',gap:10,marginBottom:11}}>
            <div style={{flex:1,fontSize:13,fontWeight:600,lineHeight:1.3}}>{sel.name}</div>
            <button onClick={()=>setSel(null)} className="bg" style={{padding:3,flexShrink:0}}><Ic n="x" size={15}/></button>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:11}}>
            <span style={{fontSize:12,color:'#6b7a99',whiteSpace:'nowrap'}}>{tx('amount')}</span>
            <input type="number" value={amt} onChange={e=>setAmt(e.target.value)} style={{width:90,textAlign:'center'}} min="1" max="3000"/>
          </div>
          {parseFloat(amt)>0&&(
            <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:11}}>
              {[{l:tx('calories'),v:Math.round(sel.calories*parseFloat(amt)/100),c:'#00e676',u:'kcal'},{l:'P',v:(sel.protein*parseFloat(amt)/100).toFixed(1),c:'#4ade80',u:'g'},{l:'C',v:(sel.carbs*parseFloat(amt)/100).toFixed(1),c:'#60a5fa',u:'g'},{l:'G',v:(sel.fat*parseFloat(amt)/100).toFixed(1),c:'#f59e0b',u:'g'},{l:tx('fiber'),v:((sel.fiber||0)*parseFloat(amt)/100).toFixed(1),c:'#a78bfa',u:'g'},{l:tx('sugar'),v:((sel.sugar||0)*parseFloat(amt)/100).toFixed(1),c:'#f87171',u:'g'}].map(x=>(

/* ══════════════════════════════════════════════════════

function HydrationPage({uid:uidProp}){
  const{user,tx}=useA();
  const uid=uidProp||user.id;
  const today=new Date().toISOString().split('T')[0];
  const prof=DB.prof(uid);
  const hyd=calcHydration(prof.bio);
  const[log,setLog]=useState(()=>DB.wlog(uid,today));
  const[custom,setCustom]=useState('');
  const consumed=(log.entries||[]).reduce((a,e)=>a+e.ml,0);
  const pct=hyd.goal>0?Math.min(100,consumed/hyd.goal*100):0;
  const rem=Math.max(0,hyd.goal-consumed);
  const wc=pct>=100?'#4ade80':pct>=70?'#60a5fa':pct>=40?'#f59e0b':'#f87171';
  const msg=pct>=100?'🏆 ¡Meta cumplida!':pct>=75?'💧 ¡Casi lista!':pct>=50?'🔵 Vas bien':pct>=25?'⚠️ Hidrátate más':'🔴 ¡Toma agua ahora!';
  const add=ml=>{
    if(isNaN(ml)||ml<=0)return;
    const u={...log,entries:[...(log.entries||[]),{ml:Math.round(ml),time:new Date().toISOString()}]};
    setLog(u);DB.setWlog(uid,today,u);setCustom('');
  };
  const rm=i=>{const u={...log,entries:(log.entries||[]).filter((_,idx)=>idx!==i)};setLog(u);DB.setWlog(uid,today,u);};

  return(
    <div style={{padding:'16px 16px 90px'}} className="slide">
      {!uidProp&&<div className="bb" style={{fontSize:32,paddingTop:52,marginBottom:3}}>{tx('hydration')}</div>}
      {!uidProp&&<div style={{fontSize:11,color:'#6b7a99',marginBottom:18}}>ACSM 2024 · Meta: {hyd.goal}ml/día</div>}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:18}}>
        {(()=>{const r=70,circ=2*Math.PI*r,d=pct/100*circ;return(<svg width="170" height="170"><circle cx="85" cy="85" r={r} fill="none" stroke="#181838" strokeWidth="8"/><circle cx="85" cy="85" r={r} fill="none" stroke={wc} strokeWidth="8" strokeDasharray={`${d} ${circ}`} strokeDashoffset={circ*.25} strokeLinecap="round" style={{transition:'stroke-dasharray .7s ease'}}/><text x="85" y="78" textAnchor="middle" fontSize="28" fontWeight="700" fill={wc} fontFamily="Bebas Neue">{(consumed/1000).toFixed(1)}</text><text x="85" y="95" textAnchor="middle" fontSize="13" fill="#6b7a99" fontFamily="DM Sans">de {(hyd.goal/1000).toFixed(1)} L</text><text x="85" y="112" textAnchor="middle" fontSize="11" fill="#28285a" fontFamily="DM Sans">{Math.round(pct)}% completado</text></svg>);})()}
        <div style={{fontSize:13,color:'#6b7a99',marginTop:4}}>{msg}</div>
        <div style={{display:'flex',gap:20,marginTop:8}}>
          <div style={{textAlign:'center'}}><div className="bb" style={{fontSize:22,color:wc}}>{consumed}ml</div><div style={{fontSize:10,color:'#6b7a99'}}>{tx('waterConsumed')}</div></div>
          <div style={{textAlign:'center'}}><div className="bb" style={{fontSize:22,color:'#28285a'}}>{rem}ml</div><div style={{fontSize:10,color:'#6b7a99'}}>{tx('waterRemain')}</div></div>
        </div>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="bb" style={{fontSize:12,color:'#6b7a99',marginBottom:11,letterSpacing:'.08em'}}>REGISTRAR AGUA</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:11}}>
          {[150,250,350,500,750,1000].map(ml=><button key={ml} onClick={()=>add(ml)} style={{flex:'1 0 auto',minWidth:50,padding:'10px 6px',borderRadius:10,cursor:'pointer',border:'1.5px solid rgba(96,165,250,.28)',background:'rgba(96,165,250,.05)',color:'#60a5fa',fontSize:13,fontWeight:700,transition:'all .14s'}}>{ml<1000?ml+'ml':'1L'}</button>)}
        </div>
        <div style={{display:'flex',gap:9}}>
          <input type="number" placeholder="Cantidad en ml..." value={custom} onChange={e=>setCustom(e.target.value)} min="1" max="3000" onKeyDown={e=>e.key==='Enter'&&add(parseInt(custom)||0)}/>
          <button className="bp" onClick={()=>add(parseInt(custom)||0)} style={{width:'auto',padding:'0 18px',flexShrink:0}}><Ic n="plus" size={17} c="#05050e"/></button>
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:9}}>
        <div className="bb" style={{fontSize:13,color:'#8080a0',letterSpacing:'.07em'}}>{tx('waterLog').toUpperCase()}</div>
        <span style={{fontSize:11,color:'#22224a'}}>{log.entries?.length||0}</span>
      </div>
      {!(log.entries?.length)?(<div style={{textAlign:'center',color:'#20204a',padding:22,border:'1px dashed #181838',borderRadius:12,fontSize:13}}>{tx('noWater')}</div>):(
        <div style={{display:'flex',flexDirection:'column',gap:7}}>
          {[...log.entries].reverse().map((e,ri)=>{
            const i=(log.entries.length-1)-ri;
            return(<div key={i} style={{display:'flex',alignItems:'center',gap:11,padding:'9px 13px',background:'#0d0d22',borderRadius:11,border:'1px solid #181838'}}>
              <Ic n="drop" size={17} c="#60a5fa"/>
              <div style={{flex:1}}><span style={{fontSize:14,fontWeight:600,color:'#60a5fa'}}>{e.ml}ml</span><span style={{fontSize:11,color:'#6b7a99',marginLeft:8}}>{new Date(e.time).toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})}</span></div>
              <button onClick={()=>rm(i)} className="bg" style={{padding:3,color:'rgba(248,113,113,.5)'}}><Ic n="trash" size={13}/></button>
            </div>);
          })}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   TRAINING DAY
══════════════════════════════════════════════════════ */
function TrainingDay({dayKey,goBack,uid:uidProp}){
  const{user,tx}=useA();
  const uid=uidProp||user.id;
  const plan=DB.plan(uid);const dd=plan.days?.[dayKey]||{};
  const today=new Date().toISOString().split('T')[0];
  const[log,setLog]=useState(()=>{
    const sv=DB.tlog(uid,today);
    if(sv?.exercises?.length>0)return sv;
    return{exercises:(dd.exercises||[]).map((name,i)=>({id:i,name,sets:[{kg:'',reps:'',intensity:3,fatigue:3,rest:90}]})),totalMin:0};
  });
  const[timer,setTimer]=useState(log.totalMin||0);
  const[running,setRunning]=useState(false);
  const[addMode,setAddMode]=useState(false);
  const[newEx,setNewEx]=useState('');
  const timerRef=useRef(null);
  useEffect(()=>{
    if(running)timerRef.current=setInterval(()=>setTimer(t=>t+1),60000);
    else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[running]);
  const persist=useCallback(nl=>{setLog(nl);DB.setTlog(uid,today,nl);},[uid,today]);
  const updSet=(ei,si,upd)=>{const exs=log.exercises.map((ex,i)=>i!==ei?ex:{...ex,sets:ex.sets.map((s,j)=>j!==si?s:{...s,...upd})});persist({...log,exercises:exs});};
  const addSet=ei=>{const ex=log.exercises[ei];const last={...(ex.sets[ex.sets.length-1]||{kg:'',reps:'',intensity:3,fatigue:3,rest:90})};persist({...log,exercises:log.exercises.map((e,i)=>i!==ei?e:{...e,sets:[...e.sets,last]})});};
  const rmSet=(ei,si)=>{const ex=log.exercises[ei];if(ex.sets.length<=1)return;persist({...log,exercises:log.exercises.map((e,i)=>i!==ei?e:{...e,sets:e.sets.filter((_,j)=>j!==si)})});};
  const rmEx=ei=>persist({...log,exercises:log.exercises.filter((_,i)=>i!==ei)});
  const confAdd=()=>{if(!newEx.trim())return;persist({...log,exercises:[...log.exercises,{id:Date.now(),name:newEx.trim(),sets:[{kg:'',reps:'',intensity:3,fatigue:3,rest:90}]}]});setNewEx('');setAddMode(false);};
  const save=()=>{persist({...log,totalMin:timer,savedAt:new Date().toISOString()});goBack();};
  const col=MC[dd.muscle]||'#00e676';const dayIdx=DK.indexOf(dayKey);

  return(
    <div style={{paddingBottom:90}} className="slide">
      <div style={{padding:'52px 15px 14px',background:'#08080f',borderBottom:'1px solid #111128',position:'sticky',top:0,zIndex:60,backdropFilter:'blur(14px)'}}>
        <div style={{display:'flex',alignItems:'center',gap:11}}>
          <button onClick={goBack} className="bg" style={{padding:5}}><Ic n="back" size={22}/></button>
          <div style={{flex:1,minWidth:0}}>
            <div className="bb" style={{fontSize:27,color:col,lineHeight:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{dd.muscle||'Entrenamiento'}</div>
            <div style={{fontSize:11,color:'#6b7a99'}}>{tx('fullDays')[dayIdx>=0?dayIdx:0]} · {new Date().toLocaleDateString()}</div>
          </div>
          <button onClick={()=>setRunning(!running)} style={{display:'flex',flexDirection:'column',alignItems:'center',width:52,height:52,borderRadius:'50%',cursor:'pointer',justifyContent:'center',gap:1,transition:'all .18s',flexShrink:0,border:`2px solid ${running?col:'#20204a'}`,background:running?`${col}10`:'transparent',color:running?col:'#6b7a99'}}>
            <Ic n="clock" size={18}/><span style={{fontSize:9,fontWeight:700}}>{timer}m</span>
          </button>
        </div>
      </div>
      <div style={{padding:'13px 13px 0'}}>
        {log.exercises.length===0&&<div style={{textAlign:'center',padding:'36px 18px',color:'#28285a',border:'1px dashed #181838',borderRadius:13,marginBottom:12}}>Sin ejercicios. Agrégalos abajo.</div>}
        {log.exercises.map((ex,ei)=>(
          <div key={ex.id} className="card" style={{marginBottom:13,border:`1px solid ${col}1a`,padding:13}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:11}}>
              <div className="bb" style={{fontSize:19,color:col,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:8}}>{ex.name}</div>
              <button onClick={()=>rmEx(ei)} className="bg" style={{padding:3,color:'rgba(248,113,113,.38)',flexShrink:0}}><Ic n="trash" size={14}/></button>
            </div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead><tr style={{color:'#6b7a99',borderBottom:'1px solid #181838'}}>
                  <th style={{textAlign:'center',padding:'3px 3px',fontWeight:500,width:22}}>#</th>
                  <th style={{textAlign:'left',padding:'3px 5px',fontWeight:500}}>{tx('kgUsed')}</th>
                  <th style={{textAlign:'left',padding:'3px 5px',fontWeight:500}}>{tx('reps')}</th>
                  <th style={{textAlign:'left',padding:'3px 5px',fontWeight:500}}>{tx('restSec')}</th>
                  <th style={{width:20}}/>
                </tr></thead>
                <tbody>{ex.sets.map((s,si)=>(
                  <tr key={si} style={{borderBottom:'1px solid rgba(24,24,56,.6)'}}>
                    <td style={{padding:'4px 3px',color:col,fontWeight:700,textAlign:'center',fontSize:11}}>{si+1}</td>
                    <td style={{padding:'3px 3px'}}><input type="number" value={s.kg} onChange={e=>updSet(ei,si,{kg:e.target.value})} style={{width:56,padding:'4px 7px',fontSize:13}} placeholder="kg" min="0"/></td>
                    <td style={{padding:'3px 3px'}}><input type="number" value={s.reps} onChange={e=>updSet(ei,si,{reps:e.target.value})} style={{width:50,padding:'4px 7px',fontSize:13}} placeholder="" min="0"/></td>
                    <td style={{padding:'3px 3px'}}><input type="number" value={s.rest} onChange={e=>updSet(ei,si,{rest:e.target.value})} style={{width:54,padding:'4px 7px',fontSize:13}} placeholder="seg" min="0"/></td>
                    <td style={{padding:'3px 2px'}}><button onClick={()=>rmSet(ei,si)} className="bg" style={{padding:'2px 3px',color:'rgba(248,113,113,.35)'}}><Ic n="x" size={12}/></button></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13,marginTop:13,marginBottom:4}}>
              <Likert value={ex.sets[ex.sets.length-1]?.intensity||3} onChange={v=>updSet(ei,ex.sets.length-1,{intensity:v})} label={tx('intensity')}/>
              <Likert value={ex.sets[ex.sets.length-1]?.fatigue||3}   onChange={v=>updSet(ei,ex.sets.length-1,{fatigue:v})}   label={tx('fatigue')}/>
            </div>
            <button onClick={()=>addSet(ei)} style={{width:'100%',marginTop:9,padding:7,borderRadius:9,border:`1px dashed ${col}38`,background:'transparent',color:col,cursor:'pointer',fontSize:13}}>{tx('addSet')}</button>
          </div>
        ))}
        {addMode?(
          <div className="card" style={{marginBottom:11,border:'1px solid rgba(0,230,118,.18)'}}>
            <div style={{fontSize:12,color:'#6b7a99',marginBottom:7}}>{tx('addExercise')}</div>
            <input placeholder="Ej: Peck deck, Prensa 45°..." value={newEx} onChange={e=>setNewEx(e.target.value)} onKeyDown={e=>e.key==='Enter'&&confAdd()} autoFocus/>
            <div style={{display:'flex',gap:9,marginTop:9}}>
              <button className="bs" onClick={()=>{setAddMode(false);setNewEx('');}} style={{flex:1,justifyContent:'center'}}>{tx('cancel')}</button>
              <button className="bp" onClick={confAdd} style={{flex:2,fontSize:14,padding:10}} disabled={!newEx.trim()}><Ic n="check" size={15} c="#05050e"/> Agregar</button>
            </div>
          </div>
        ):(
          <button className="bs" onClick={()=>setAddMode(true)} style={{width:'100%',justifyContent:'center',marginBottom:11,padding:11}}><Ic n="plus" size={16}/> {tx('addExercise')}</button>
        )}
        <div className="card" style={{marginBottom:13,display:'flex',alignItems:'center',gap:13}}>
          <Ic n="clock" size={19} c="#6b7a99"/>
          <div style={{flex:1}}><div style={{fontSize:11,color:'#6b7a99',marginBottom:4}}>{tx('totalMin')}</div><input type="number" value={timer} onChange={e=>setTimer(Number(e.target.value)||0)} style={{width:80,padding:'7px 10px'}} min="0"/></div>
          <div style={{fontSize:11,color:running?'#00e676':'#28285a'}}>{running?'● En curso':'Pausado'}</div>
        </div>
        <button className="bp" onClick={save}><Ic n="check" size={17} c="#05050e"/> {tx('saveSession')}</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   PROFILE PAGE

function ProfilePage({go}){
  const{user,tx,logout,updateUser}=useA();
  const[pw,setPw]=useState('');

  const[pwErr,setPwErr]=useState('');
  const photoRef=useRef();
